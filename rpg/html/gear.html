<html lang="en">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1410;
            --surface: #231d17;
            --primary: #c9a66b; /* Gold accent from the site */
            --text-main: #d1d5db;
            --text-dim: #9ca3af;
            --border: #262f3d;
            --accent: #e5c07b;
            --header-bg: linear-gradient(90deg, var(--surface2) 0%, var(--surface) 100%);
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 0.5rem;
            margin: 2rem 0 1rem;
            font-weight: 700;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 3rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            font-family: 'Cinzel', serif;
            background-color: var(--header-bg);
            color: var(--primary);
            padding: 1.2rem 1rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-bottom: 2px solid var(--primary);
            text-align: left;
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .center { text-align: center; }
        .name-cell { font-family: 'Cinzel', serif; font-weight: bold; color: #fff; font-size: 0.95rem; }

        /* Expand/Collapse Toggle */
        .toggle-btn {
            cursor: pointer;
            display: inline-block;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 22px;
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: 2px;
            margin-right: 12px;
            font-weight: bold;
            user-select: none;
            color: var(--primary);
            transition: all 0.2s ease;
        }
        
        .toggle-btn:hover {
            background: var(--primary);
            color: var(--bg);
        }

        /* Detail Row Styles */
        .details-row { display: none; background-color: #0d1218; }
        .details-content { display: flex; gap: 30px; padding: 25px; border-left: 3px solid var(--primary); }
        .details-left { flex: 0 0 220px; }
        .details-mid { flex: 1; min-width: 300px; }
        .details-right { flex: 1.5; }

        .armour-img {
            width: 100%;
            border-radius: 2px;
            border: 1px solid var(--primary);
            filter: sepia(0.3) contrast(1.1);
            background: #000;
        }

        .comp-table {
            width: 100%;
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }

        .comp-table th { 
            padding: 8px; 
            background: var(--header-bg); 
            color: var(--primary); 
            border-bottom: 1px solid var(--primary);
        }
        
        .comp-table td { padding: 8px; border-bottom: 1px solid var(--border); }

        .dmg-num { color: var(--accent); font-weight: 600; font-family: 'Cinzel', serif; }
        .attack-tag { 
            background: rgba(201, 166, 107, 0.05); 
            border: 1px solid var(--border); 
            padding: 6px 10px; 
            margin: 4px 0; 
            display: block; 
        }

        h4 { font-family: 'Cinzel', serif; text-transform: uppercase; }
    </style>
</head>

        const wBody = document.querySelector("#weaponTable tbody");
        Object.entries(gearData.weapons).forEach(([name, w]) => {
            const row = wBody.insertRow();
            const attackHtml = w.attacks.map(a => {
                const dmgArr = Array.isArray(a.damage) ? a.damage : [a.damage];
                const dmgString = dmgArr.map((d, i) => `<span class="dmg-num">${fmtDamage(d)}</span> ${a.type[i]}`).join(' / ');
                return `<div class="attack-tag"><strong>${a.action}</strong>: ${dmgString} <span style="display:block; font-size:0.7rem; color:var(--text-dim)">${a.skill}</span></div>`;
            }).join('');

            row.innerHTML = `
                <td class="name-cell">${name}</td>
                <td>${attackHtml}</td>
                <td class="center">${w.reach}</td>
                <td class="center">${w.parry || '—'}</td>
                <td class="center">${w.durability || '—'}</td>
                <td class="center">${fmtDamage(w.strength[0])}</td>
                <td class="center">${fmtDamage(w.strength[1])}</td>
                <td class="center">${w.weight || '—'}</td>
                <td class="center">${w.cost || '—'}</td>
            `;
        });

            detailRow.id = `details-${index}`;

                <td><span class="toggle-btn" onclick="toggleDetails(${index})">+</span> <span class="name-cell">${name}</span></td>
                <td class="center dmg-num">${a.stats.crush}</td>

                        <div class="details-left"><img class="armour-img" src="${a.image}" alt="${name}"></div>
                        <div class="details-mid">
                            <h4 style="margin:0 0 10px 0; color:var(--primary)">Description</h4>
                            <p style="font-size:0.8rem; color:var(--text-main)">${a.description}</p>
                            <h4 style="margin:15px 0 10px 0; color:var(--accent)">Failure Condition</h4>
                            <p style="font-size:0.8rem; color:var(--text-dim)">${a.failure}</p>
                        </div>
                        <div class="details-right">
                            <table class="comp-table">
                                <thead><tr><th>Part</th><th>Protects</th><th>Weight (kg)</th><th>Cost (€)</th></tr></thead>
                                <tbody>${compRows}</tbody>
                            </table>
                        </div>
                    </div>
                </td>
            `;
        });

        function toggleDetails(idx) {
            const row = document.getElementById(`details-${idx}`);
            const btn = document.querySelectorAll('.toggle-btn')[idx];
            if (row.style.display === 'table-row') {
                row.style.display = 'none';
                btn.textContent = '+';
            } else {
                row.style.display = 'table-row';
                btn.textContent = '-';
            }
        }
    </script>
</body>
</html>
