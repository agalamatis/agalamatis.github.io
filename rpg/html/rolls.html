
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Normal Distribution Roller</title>
        <link rel="stylesheet" type="text/css" href="../css/rolls.css">
    </head>
    <body>
        <div id="app">
        <div class="controls">

            <div style="display:flex; align-items:center; gap:18px; flex-wrap:wrap;">
            <button class="roll-btn" id="rollBtn">Roll</button>
            <div class="roll-result" id="rollResult">—</div>
            </div>

            <!-- Actor / Modifier slider -->
            <div class="slider-row">
            <span class="slider-label" id="actorLabel">Modifier</span>
            <input type="range" class="mod-range" id="actorSlider" min="-10" max="10" step="1" value="0">
            <span class="mod-val" id="actorVal">0</span>
            </div>

            <!-- Resisted collapsable section -->
            <div>
            <div class="resisted-toggle" id="resistedToggle">
                <span class="arrow" id="toggleArrow">&#9654;</span>
                <span>Resisted</span>
            </div>
            <div class="resisted-body" id="resistedBody">
                <div class="slider-row" style="margin-top: 10px;">
                <span class="slider-label active">Target</span>
                <input type="range" class="mod-range" id="targetSlider" min="-10" max="10" step="1" value="0">
                <span class="mod-val" id="targetVal">0</span>
                </div>
            </div>
            </div>

        </div>

        <div class="chart-wrap">
            <canvas id="distChart"></canvas>
        </div>

        <div class="legend">
            <span><span class="leg-dot" style="background:#3B6D11;"></span>PDF</span>
            <span><span class="leg-dot" style="background:#111;"></span>Roll result</span>
            <span><span class="leg-dot" style="background:#185FA5;"></span>CDF</span>
        </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
        <script src="../js/rolls.js"></script>
    </body>
</html>
