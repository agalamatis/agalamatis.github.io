
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Sheet</title>
<style>
  :root {
    --bg: #1a1410;
    --surface: #231d17;
    --surface2: #2d2520;
    --border: #4a3c2e;
    --border-light: #5c4a38;
    --gold: #c8a454;
    --gold-dim: #9a7a3e;
    --text: #e8dcc8;
    --text-dim: #a09070;
    --text-muted: #6a5a44;
    --red: #c05040;
    --green: #5a9060;
    --blue: #4a7a9a;
    --grey: #808080;
    --accent: #8a6030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ─── HEADER ─── */
  #header {
    background: linear-gradient(180deg, #0e0b08 0%, var(--surface) 100%);
    border-bottom: 2px solid var(--gold-dim);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }

  #char-name {
    font-size: 1.7rem;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    flex: 1;
  }

  #char-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  #char-select:hover, #char-select:focus {
    border-color: var(--gold-dim);
  }

  /* ─── MAIN CONTENT ─── */
  #content {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ─── SECTION ─── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    cursor: pointer;
    background: linear-gradient(90deg, var(--surface2) 0%, var(--surface) 100%);
    border-bottom: 1px solid var(--border);
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover {
    background: linear-gradient(90deg, #332b21 0%, var(--surface2) 100%);
  }

  .section-title {
    font-size: 1.05rem;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .chevron {
    color: var(--gold-dim);
    font-size: 1rem;
    transition: transform 0.25s;
    display: inline-block;
  }
  .section.collapsed .chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  .section-body {
    padding: 16px 18px;
  }

  /* ─── ATTRIBUTES ─── */
  .attrs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
  }

  .attr-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .attr-val {
    font-size: 1.1rem;
    font-weight: bold;
    min-width: 32px;
    text-align: center;
    color: var(--gold);
  }
  .attr-val.neg { color: var(--red); }
  .attr-val.zero { color: var(--text-dim); }

  .attr-name {
    font-size: 0.95rem;
    color: var(--text);
  }

  /* ─── SKILLS ─── */
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
  }

  @media (max-width: 560px) {
    .skills-grid { grid-template-columns: 1fr; }
    .attrs-grid { grid-template-columns: 1fr; }
  }

  .skill-row {
    display: flex;
    flex-direction: column;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .skill-main {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    min-height: 34px;
  }

  .skill-val {
    font-size: 1rem;
    font-weight: bold;
    min-width: 28px;
    text-align: center;
    color: var(--gold);
  }
  .skill-val.neg { color: var(--red); }
  .skill-val.zero { color: var(--text-dim); }
  .skill-val.derived { color: var(--grey); font-weight: normal; font-style: italic; }

  .skill-name {
    font-size: 0.88rem;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }
  .skill-name.derived { color: var(--grey); }

  .skill-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1rem;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .skill-toggle:hover {
    color: var(--gold);
    background: rgba(200,164,84,0.12);
  }
  .skill-toggle.open { color: var(--gold); }

  .skill-detail {
    display: none;
    padding: 8px 12px 10px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .skill-detail.open { display: block; }

  .skill-detail-section { margin-bottom: 6px; }
  .skill-detail-label {
    color: var(--gold-dim);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  /* ─── ABILITIES ─── */
  .abilities-cat {
    margin-bottom: 18px;
  }
  .abilities-cat:last-child { margin-bottom: 0; }

  .abilities-cat-header {
    font-size: 0.82rem;
    font-weight: bold;
    color: var(--gold-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ability-level {
    color: var(--gold);
    font-size: 0.9rem;
  }

  .ability-item {
    margin-bottom: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.88rem;
    line-height: 1.55;
  }
  .ability-item:last-child { margin-bottom: 0; }

  .ability-name {
    font-weight: bold;
    color: var(--text);
  }

  .ability-desc {
    color: var(--text-dim);
  }

  /* ─── TRAITS ─── */
  .trait-item {
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 4px;
    font-size: 0.88rem;
    line-height: 1.55;
  }
  .trait-item:last-child { margin-bottom: 0; }
  .trait-name {
    font-weight: bold;
    color: var(--text);
  }
  .trait-desc {
    color: var(--text-dim);
    white-space: pre-line;
  }

  /* ─── GEAR ─── */
  .gear-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .gear-item {
    padding: 7px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.9rem;
    color: var(--text-dim);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .gear-item::before {
    content: '◆';
    color: var(--gold-dim);
    font-size: 0.6rem;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .empty-msg {
    color: var(--text-muted);
    font-style: italic;
    font-size: 0.9rem;
  }
</style>
</head>

const SKILLS_DB = {"Acrobatics": {"default": -5, "grants": ["Erotic Art"], "description": "This is the ability to perform gymnastic stunts, roll, take falls, etc. This can be handy on an adventure, as tightrope walking, human pyramids, and trapeze swinging all have useful applications. Each trick requires a sep- arate skill roll, at whatever penalties the GM sees fit. If you are performing stunts on a moving vehicle or mount, roll against the lower of Acrobatics and the appropriate Riding skill.\nYou may substitute an Acrobatics roll for a DX roll in any attempt to jump, roll, avoid falling down, etc. As well, you may attempt an Acrobatic Dodge in combat – a jump or roll that avoids an attack in a flashy way (see Acrobatic Dodge, p. 375). Finally, a suc- cessful Acrobatics roll will reduce the effective distance of any fall by five yards (see Falling, p. 431).", "modifiers": "", "notes": ""}, "Acting": {"default": -4, "grants": ["Fast-Talk", "Intimidation", "Performance", "Public Speaking"], "description": "This is the ability to counterfeit moods, emotions, and voices, and to lie convincingly over a period of time. A successful Acting roll lets you pretend to feel something that you do not. The GM may also require an Acting roll whenever you try to fool someone, play dead in combat, etc.\nImpersonation is a special type of acting. To impersonate someone, you must first successfully disguise yourself (see Disguise, p. 187) – unless your vic- tims cannot see you!\nNote that Acting is not the same Fast-Talk (the art of the “quick con”) or Performance (the skill of screen and stage acting).", "modifiers": "+1 for every point of IQ you have over the person you are trying to fool (or the smartest one in the group), or -1 for every point of differ- ence if your victim is smarter than you; -3 for Low Empathy (p. 142); -1 to -4 for Shyness (p. 154); -5 for Truthfulness (p. 159), but only if you are trying to deceive someone. For impersonation only:  -5 if you are not well acquainted with your subject; -5 if those you wish to fool are acquaintances of the subject (-10 for close acquaintances).", "notes": ""}, "Administration": {"default": -4, "grants": [], "description": "This is the skill of running a large organization. It is often a prerequisite for high Rank (p. 29). A successful Administration roll gives you a +2 reac- tion bonus when dealing with a bureaucrat, and allows you to predict the best way to go about dealing with a bureaucracy.", "modifiers": "", "notes": ""}, "Alchemy": {"default": -6, "grants": ["Poisons"], "description": "This is the study of the properties, transformations and transmutations of matter. An alchemist would be able to identify elements and simple compounds (but not necessarily drugs, magical substances, etc.) with magical effects (“elixirs”), such as love potions and healing unguents, and even prepare them from suitable ingredients given the proper equipment. This is a mechanical process; therefore, those without supernatural abilities can learn and use Alchemy, but without conferring any benefit.", "modifiers": "", "notes": "Includes Chemistry (p.183), Engineering (Materials) (p.190) and Metallurgy (p.209)."}, "Algebra": {"default": -5, "grants": ["Gambling", "Economics"], "description": "The knowledge of manipulating abstract mathematical symbols to solve abstract problems like some polynomial equations, systems of linear equations and manipulate matrixes and elementary series. It is essential to keep books of account, to examine the condition of a business, etc. A successful Accounting roll (requires at least two hours of study, and possibly months to audit a large corporation) can tell you whether financial records are correct, and possi- bly reveal evidence of forgery, tamper- ing, and similar criminal activity.", "modifiers": "The time modifiers under Time Spent (p. 346) often apply; the Talents (p. 89) of Business Acumen and Mathematical Ability both provide a bonus.", "notes": "Replaces Mathematics specialties. Includes Accounting ()p.174"}, "Animal Handling (Aves/Accipitridae)": {"default": -4, "grants": ["Falconry"], "description": "This is the ability to train and work with buzzards, eagles, harriers, hawks, kites, vultures. To train an animal, make an Animal Handling roll once per day of training. A failed roll means the animal learned nothing; a badly failed roll means you are attacked. The time it takes to train an animal depends on the beast’s intelligence and tractability.\nWhen working with a trained animal, roll against skill for each task you set the animal. This roll is at -5 if the animal is not familiar with you, -5 if the circumstances are stressful to the animal, and -3 or more if the task is a complex one. To put on an entertaining circus act, snake-charming show, etc., you must make a separate Performance roll!\nThis skill can also be used to calm a wild, dangerous, or untrained animal. This roll is at -5 if the creature is wild or very frightened, or -10 if it is a man-eater or man-killer.\nFinally, this skill gives an advantage in combat against animals within your specialty. If you have Animal Handling at level 15, an animal’s attack and defence rolls are at -1 against you, because you can predict its behaviour. At skill 20, the animal’s rolls are at -2.", "modifiers": "", "notes": "Includes Veterinary (p.227)"}, "Animal Handling (Aves/Aequornithes)": {"default": -4, "grants": [], "description": "This is the ability to train and work with egrets, herons, storks. To train an animal, make an Animal Handling roll once per day of training. A failed roll means the animal learned nothing; a badly failed roll means you are attacked. The time it takes to train an animal depends on the beast’s intelligence and tractability.\nWhen working with a trained animal, roll against skill for each task you set the animal. This roll is at -5 if the animal is not familiar with you, -5 if the circumstances are stressful to the animal, and -3 or more if the e rebellious oligarch of Transdunabia, but have no special insight into the reasons and logistics of the merchants or the rebels.\nOther areas of information this skills includes are: \nBusiness:  Exchange rates, investment performance, etc.\nHeadline News:  Usually bad news, such as assassinations, plagues, and wars.\nHigh Culture:  Information on galleries, operas, symphonies, and so forth.\nPeople:  The names of and gossip on celebrities, heads of state, and the like.\nPolitics:  Election results, international treaties, etc.\nPopular Culture:  Hit songs, cool fashions, and hot products, among other things.\nRegional:  News of all kinds of the region. This is the definitive “town crier” skill.\nScience & Technology:  New discoveries and inventions.\nOn a successful roll, the GM will inform you of any news that pertains to the current adventure (possibly including clues, on a good roll) or give you a small skill bonus.", "modifiers": "", "notes": "Includes Current Affairs (all specialties), Geography (all specialies), and the Political History of the area."}, "Area Knowledge (Balkans/Epirus)": {"default": -4, "grants": ["Area Knowledge (Balkans/Macedonia)", "Area Knowledge (Balkans/Serbia)"], "description": "This skill represents familiarity with the people, places, and politics of a given region by assimilating quickly whatever qualifies as “news” in that area, and to recall it as needed. If information about other areas is available, the GM may allow you to learn additional Area Knowledge skills.\nThe GM should not require Area Knowledge rolls for ordinary situations; e.g., to find the blacksmith, tavern, or your own home. But he could require a roll to locate a smith to shoe your horse at 3 a.m., or to find the best ambush spot along a stretch of road. “Secret” or obscure information might give a penalty or simply be unavailable – GM’s decision. For instance, Area Knowledge of Banat of Severin grants you the knowledge of the location of the Hospitalliers chapte "grants": [], "description": "This is the ability to build, modify, all weapons used with the Cannons and Handgonnes skills. It does not include skill at design; for that, see Engineer (p.190). A successful roll lets you find a problem, if it isn’t obvious; a second roll lets you repair it. Time required is up to the GM.", "modifiers": "-2 for an unfamiliar item within your specialty (e.g. plate armor when you’re used to mail); equipment modifiers (p.345).", "notes": ""}, "Armoury (Melee Weapons)": {"default": -4, "grants": ["Armoury (Armour)"], "description": "This is the ability to build, modify, any weapon used with a Melee Weapon or Thrown Weapon skill, as well as all kinds of shields. It does not include skill at design; for that, see Engineer (p.190). A successful roll lets you find a problem, if it isn’t obvious; a second roll lets you repair it. Time required is up to the GM.", "modifiers": "-2 for an unfamiliar item within your specialty (e.g. plate armor when you’re used to mail); equipment modifiers (p.345).", "notes": ""}, "Armoury (Missile Weapons)": {"default": -4, "grants": [], "description": "This is the ability to build, modify, all weapons used with the Bolt Thowers and Catapult skills, as well as any man-portable, pre-gunpowder projectile weapons of all kinds – bows, crossbows, slings, etc. It does not include skill at design; for that, see Engineer (p.190).", "modifiers": "-2 for an unfamiliar item within your specialty (e.g. plate armor when you’re used to mail); equipment modifiers (p.345).", "notes": ""}, "Artist (Body Art)": {"default": -5, "grants": ["Artist (Calligraphy)", "Artist (Drawing)", "Artist (Illumination)", "Artist (Painting)"], "description": "This skill represents talent at a visual art by tattooing, piercing, and scarification. A successful roll might let you create a recognisable likeness of a person or an object, or a work beautiful enough to sell (the GM should not allow a default roll for this use!). Time required is up to the GM.\nArtist is based on IQ, but there are many situations in which the GM could logically ask for a DX-based roll, in which case modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) would apply. In rare cases, even a ST-based Artist roll might make sense.\nArtist skill is used to earn a living rather than to create fine art, and some people regard them as “craft” skills, not “art” skills. It is up to you whether you focus on beauty, realism, or functionality.", "modifiers": "Equipment modifiers (p.345); -2 if the medium is unfamiliar (e.g., tempera when you are used to oils); -5 if the medium is difficult (e.g., marble, for a sculptor).", "notes": ""}, "Artist (Calligraphy)": {"default": -5, "grants": ["Artist (Body Art)", "Artist (Drawing)", "Artist (Illumination)", "Artist (Painting)"], "description": "This skill represents talent at beautiful and decorative handwriting. You need not be literate! Time required is up to the GM.\nArtist is based on IQ, but there are many situations in which the GM could logically ask for a DX-based roll, in which case modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) would apply. In rare cases, even a ST-based Artist roll might make sense.\nArtist skill is used to earn a living rather than to create fine art, and some people regard them as “craft” skills, not “art” skills. It is up to you whether you focus on beauty, realism, or functionality.", "modifiers": "Equipment modifiers (p.345); -2 if the medium is unfamiliar (e.g., tempera when you are used to oils); -5 if the medium is difficult (e.g., marble, for a sculptor).", "notes": ""}, "Artist (Drawing)": {"default": -5, "grants": ["Artist (Body Art)", "Artist (Calligraphy)", "Artist (Illumination)", "Artist (Painting)"], "description": "This skill represents talent at a visual art using all forms of charcoal, ink, pastel, and pencil work. A successful roll might let you create a recognisable likeness of a person or an object, or a work beautiful enou is skill represents talent at creating pleasing building interiors by selecting appropriate paints, fixtures, and furniture. Time required is up to the GM.\nArtist is based on IQ, but there are many situations in which the GM could logically ask for a DX-based roll, in which case modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) would apply. In rare cases, even a ST-based Artist roll might make sense.\nArtist skill is used to earn a living rather than to create fine art, and some people regard them as “craft” skills, not “art” skills. It is up to you whether you focus on beauty, realism, or functionality.", "modifiers": "Equipment modifiers (p.345); -2 if the medium is unfamiliar (e.g., tempera when you are used to oils); -5 if the medium is difficult (e.g., marble, for a sculptor).", "notes": ""}, "Artist (Painting)": {"default": -5, "grants": ["Artist (Body Art)", "Artist (Calligraphy)", "Artist (Drawing)", "Artist (Illumination)"], "description": "This skill represents talent at all forms of painting, whether on paper, canvas, or a wall, and whether with tempera, oil-based paint, or something more exotic (like blood). A successful roll might let you create a recognisable likeness of a person or an object, or a work beautiful enough to sell (the GM should not allow a default roll for this use!). Time required is up to the GM.\nArtist is based on IQ, but there are many situations in which the GM could logically ask for a DX-based roll, in which case modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) would apply. In rare cases, even a ST-based Artist roll might make sense.\nArtist skill is used to earn a living rather than to create fine art, and some people regard them as “craft” skills, not “art” skills. It is up to you whether you focus on beauty, realism, or functionality.", "modifiers": "Equipment modifiers (p.345); -2 if the medium is unfamiliar (e.g., tempera when you are used to oils); -5 if the medium is difficult (e.g., marble, for a sculptor).", "notes": ""}, "Artist (Pottery)": {"default": -5, "grants": [], "description": "This skill represents talent at working with various sorts of ceramics – especially clay. A successful roll might let you create a recognisable likeness of a person or an object, or a work beautiful enough to sell (the GM should not allow a default roll for this use!). Time required is up to the GM.\nArtist is based on IQ, but there are many situations in which the GM could logically ask for a DX-based roll, in which case modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) would apply. In rare cases, even a ST-based Artist roll might make sense.\nArtist skill is used to earn a living rather than to create fine art, and some people regard them as “craft” skills, not “art” skills. It is up to you whether you focus on beauty, realism, or functionality.", "modifiers": "Equipment modifiers (p.345); -2 if the medium is unfamiliar (e.g., tempera when you are used to oils); -5 if the medium is difficult (e.g., marble, for a sculptor).", "notes": ""}, "Artist (Scene Design)": {"default": -5, "grants": ["Artist (Interior Decorating)"], "description": "This skill represents talent at designing sets for the stage. Time required is up to the GM.\nArtist is based on IQ, but there are many situations in which the GM could logically ask for a DX-based roll, in which case modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) would apply. In rare cases, even a ST-based Artist roll might make sense.\nArtist skill is used to earn a living rather than to create fine art, and some people regard them as “craft” skills, not “art” skills. It is up to you whether you focus on beauty, realism, or functionality.", "modifiers": "Equipment modifiers (p.345); -2 if the medium is unfamiliar (e.g., tempera when you are used to oils); -5 if the medium is difficult (e.g., marble, for a sculptor).", "notes": ""}, "Artist (Sculpting)": {"default": -5, "grants": ["Masonry"], "description": "This skill represents talent at creating three-dimensional art from ivory, stone, metal, etc. A successful roll might let you create a recognisable likeness of a person or an object, or a work beautiful enough to sell (the GM should not allow a default roll for this use!). Time required is up to the GM.\nArtist is based on IQ, but there are many situations in which the GM could logically ask for a DX-based roll, in which case modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) would apply. In rare cases, even a ST-based Artist roll might make sense.\nArtist skill is used to earn a living rather than to create fine art, and some people regard them as “craft” skills, not “art” skills. It is up to you whether you focus on beauty, realism, or functionality.", "modifiers": "Equipment modifiers (p.345); -2 if the medium is unfamiliar (e.g., tempera when you are used to oils); -5 if the medium is difficult (e.g., marble, for a sculptor).", "notes": ""}, "Artist (Woodworking)": {"default": -5, "grants": ["Carpentry"], "description": "This skill represents talent at cll forms of fine woodwork, including cabinet-making and decorative carving. A successful roll might let you create a recognisable likeness of a person or an object, or a work beautiful enough to sell (the GM should not allow a default roll for this use!). Time required is up to the GM.\nArtist is based on IQ, but there are many situations in which the GM could logically ask for a DX-based roll, in which case modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) would apply. In rare cases, even a ST-based Artist roll might make sense.\nArtist skill is used to earn a living rather than to create fine art, and some people regard them as “craft” skills, not “art” skills. It is up to you whether you focus on beauty, realism, or functionality.", "modifiers": "Equipment modifiers (p.345); -2 if the medium is unfamiliar (e.g., tempera when you are used to oils); -5 if the medium is difficult (e.g., marble, for a sculptor).", "notes": ""}, "Astronomy": {"default": -6, "grants": ["Cartography"], "description": "This is the study of stars and other extra-planetary objects. An astronomer could answer questions about the Sun, the planets of the solar system, etc. A successful roll determines the approximate time of day. Most importantly, this skill lets you get your directions and navigate using the Sun and the stars.", "modifiers": "", "notes": "Includes Navigation (Sea) (p.211)."}, "Boating (Sailboat)": {"default": -4, "grants": ["Boating (Unpowered)", "Shiphandling"], "description": "This is the ability to handle any small watercraft moving under sail. For large vessels that require multiple crewmen on a “bridge,” use Seamanship (see Crewman, p.185) and Shiphandling (p.220).\nMake a roll to get underway, to dock, and whenever you encounter a hazard. If using this skill at default, also roll when you first enter the boat – to avoid falling in the water!", "modifiers": "-2 for an unfamiliar boat within your specialty (e.g., a kayak when you’re used to a rowboat); -3 or worse for foul weather, navigational hazards, etc.", "notes": ""}, "Boating (Unpowered)": {"default": -4, "grants": ["Boating (Sailboat)", "Shiphandling"], "description": "This is the ability to handle any small watercraft that relies on muscle power, whether it is paddled, rowed, or poled. Includes canoes, rowboats, and rafts. For large vessels that require multiple crewmen on a “bridge,” use Seamanship (see Crewman, p.185) and Shiphandling (p.220).\nMake a roll to get underway, to dock, and whenever you encounter a hazard. If using this skill at default, also roll when you first enter the boat – to avoid falling in the water!", "modifiers": "-2 for an unfamiliar boat within your specialty (e.g., a kayak when you’re used to a rowboat); -3 or worse for foul weather, navigational hazards, etc.", "notes": ""}, "Body Language": {"default": -4, "grants": ["Detect Lies"], "description": "This is the ability to interpret a person’s facial expressions and body posture in order to gauge his feelings. You can use it like the Empathy advantage (p.51) or Detect Lies skill (p.187), but only on a subject you can see. You can also use it to get a rough idea of what a party member is doing or about to do in a situation where he cannot communicate with you directly (for instance, when using Stealth). You can only observe one subject at a time.\nThe ability to read body language in combat is a standard part of any Brawling and Melee Weapon skill; see Feint (p. 365).", "modifiers": "All Vision modifiers; physiology modifiers (see box); +4 if your subject is Easy to Read (p. 134). Anything that makes the subject hard- er to “read” gives a penalty:  baggy clothing gives -1, a shield or a voluminous cloak gives from -2 to -4, and a mask gives -5 (and makes it impossible to use this skill if you cannot see the rest of the body!).", "notes": ""}, "Brawling": {"default": -3, "grants": [], "description": "This is the skill of unarmed combat. Roll against Brawling to hit with a punch, or Brawling-2 to hit with a kick. Brawling can also replace DX when you attack with teeth, claws, horns, or other “natural weapons.”\nBrawling improves damage. If you know Brawling at DX+2 level or better, add +1 per die to basic thrust damage when you calculate damage with Brawling attacks – punches, kicks, claws, bites, etc. Work out damage ahead of time and record it on your character sheet.\nBrawling includes the ability to use the blackjack or sap. An attack with such a fist load is considered a punch at +1 to damage.\nWhen you defend with bare hands, Brawling allows you to parry two different attacks per turn, one with each hand. Your Parry score is (skill/2) + 3, rounded down. Brawling also gives an improved retreating bonus when you parry; see Retreat (p. 377). Brawling parries are at -3 vs. weapons other than thrusting attacks. For more on barehanded parries, see Parrying Unarmed (p. 376).", "modifiers": "", "notes": "Includes Boxing (p.182), Karate (p.203) and Wrestling (p.228)"}, "Breath Control": {"default": -5, "grants": [], "description": "This is the ability to breathe at maximum efficiency. On a successful skill roll, you can increase the time you can hold your breath for any reason (e.g., underwater) by 50%, or regain one FP in only two minutes (you cannot combine this with magic spells that restore FP).", "modifiers": "", "notes": ""}, "Camouflage": {"default": -3, "grants": [], "description": "This is the ability to use natural materials, special fabrics and paints, etc. to hide yourself, your position, or your equipment. To see through your camouflage, an observer must win a Quick Contest of Vision or Observation skill (p.211) vs. your Camouflage skill.\nDepending on the circumstances, successful camouflage might hide its subject entirely or merely blur its outlines to make it harder to hit (-1 to attacker’s skill). Camouflage will not improve your Stealth roll, but if you fail a Stealth roll while camouflaged, those who heard you must still see through your camouflage to see you.", "modifiers": "Modifiers:  Equipment modifiers (p. 345). Apply a penalty equal to the Size Modifier of a large object (e.g., -5 for a tank with SM +5). This makes it difficult to camouflage large objects, but remember that distant observers suffer large Vision penalties for range – see Vision (p.358).", "notes": ""}, "Carousing": {"default": -3, "grants": [], "description": "This is the skill of socializing, partying, etc. A successful Carousing roll, under the right circumstances, gives you a +2 bonus on a request for aid or information, or just on a general reaction. A failed roll means you made a fool of yourself in some way; you get a -2 penalty on any reaction roll made by those you caroused with. If you do your carousing in the wrong places, a failed roll can have other dangers!", "modifiers": "Up to +3 for buying drinks or other entertainment for your fellow carousers; -3 for Killjoy (p. 140); -3 for Low Empathy (p. 142); -1 to -4 for Shyness (p. 154).", "notes": "Includes Connoisseur (p.185)"}, "Carpentry": {"default": -3, "grants": ["Artist (Woodworking)"], "description": "This is the ability to build things out of wood. A successful roll lets you do one hour’s worth of competent carpentry. A failed roll means the work was bad. The GM may require DX-based Carpentry rolls for certain kinds of fine work.", "modifiers": "Equipment modifiers (p. 345); +5 if you are being supervised or assisted by someone with skill 15 or better.", "notes": ""}, "Cartography": {"default": -4, "grants": ["Orienteering"], "description": "This is the ability to create and interpret maps and charts. Roll against this skill to map any location as you move through it.", "modifiers": "", "notes": ""}, "Choreography": {"default": -4, "grants": ["Dancing"], "description": "The ability to instruct and lead a group of dancers.", "modifiers": "", "notes": "Was specialty of Group Performance (p.198)"}, "Climbing": {"default": -4, "grants": ["Knot-Tying"], "description": "This is the ability to climb mountains, rock walls, trees, the sides of buildings, etc. See Climbing (p.349) for details.", "modifiers": "+2 for Brachiator (p. 41); +3 for Flexibility or +5 for Double- Jointed (p. 56); +1 for Perfect Balance (p. 74); a penalty equal to encum- brance level (e.g., -1 for Light encumbrance).", "notes": ""}, "Concentration": {"default": -5, "grants": [], "description": "This is the ability to calm the emotions, control the mind, and relax the body. To use this skill, you must con- centrate for (20 - skill) seconds, mini- mum one second, and then roll vs. skill. On a success, you enter a trance- like state, which you can maintain for hours.\nA meditative trance is required for certain rituals and is a common preparation for prayer. In addition, the GM may permit you to meditate on a particular moral dilemma. On a successful Meditation roll, the GM will “enlighten” you, providing a hint as to which course of action “feels” right.", "modifiers": "", "notes": "Replaces Meditation"}, "Conducting": {"default": -4, "grants": [], "description": "The ability to coordinate a group of musicians. Choirs, swing bands, symphony orchestras, etc. are different familiarities.", "modifiers": "Cultural Familiarity modifiers (p. 23) definitely apply! Different cultures develop distinct gesture vocabularies.", "notes": "Was specialty of Group Performance (p.198)"}, "Cooking": {"default": -4, "grants": [], "description": "This is the skill of being a chef – you do not need it to heat water and open boxes, or to cook rat-on-a-stick over your campfire. A successful skill roll allows you to prepare a pleasing meal.", "modifiers": "", "notes": ""}, "Counterfeiting": {"default": -5, "grants": ["Forgery"], "description": "This is the art of duplicating banknotes (i.e. MOU issued by knightly orders) and coins. It is only taught by the underworld. Time required varies from days to weeks (GM’s option). The GM secretly rolls against your Counterfeiting skill for each “batch” of money.\nA critical success means that the fakes in that batch are as good as the real thing.\nAn ordinary success means that your work is good but not perfect. Whenever you try to pass the counterfeit money, the GM makes a second skill roll for you, with all the same modifiers. If this roll fails, the recipi- ent spots your handiwork. To successfully pass bogus currency to someone who has reason to be suspicious, you must win a Quick Contest of Counterfeiting vs. the highest of his Perception, Forensics, and Merchant.\nAny failure on the initial Counterfeiting roll means that the first per- son to receive the money immediately realizes that it is bogus. Critical failure – on the initial roll or any subsequent roll – has other ramifications:  the recipient is an undercover cop, an armed and angry citizen, etc.", "modifiers": "Equipment modifiers (p. 345). Materials – ink, paper, presses, etc. – stolen from the legitimate mint can give from +1 (a few rolls of paper) to +10 (actual plates or molds). You must have a sample of the real thing or you cannot make the attempt at all!", "notes": ""}, "Crewman (Seamanship)": {"default": -3, "grants": [], "description": "This is the ability to serve as crew aboard a specific type of large vehicle. It includes familiarity with “shipboard life,” knowledge of safety measures, and training in damage control (the use of emergency equipment to control flooding, fight fires, patch the hull, and so forth). Make a skill roll for basic map or chart reading, practical meteorology, or to recall laws and regulations that pertain to your vehicle.\nThis skill also lets you steer the vessel. Specialists normally handle activities such as plotting courses and operating sensors. These experts report to the captain, who in turn tells you how to manoeuvre. Make a skill roll whenever you take the helm – but note that your effective skill cannot exceed your captain’s Ship-handling skill (p. 220).\nThe average Crewman skill of an entire crew can be used as a measure of overall crew quality. The GM rolls against average skill whenever the vehicle arrives or departs, in unfavorable conditions, or in battle. Failure and critical failure results depend on the circumstances.", "modifiers": "", "notes": ""}, "Cryptography": {"default": -5, "grants": [], "description": "This is the ability to create and defeat encryption systems, codes, and ciphers. It is of use in wartime, espi- onage, and even business dealings. It covers all the techniques of your TL, which can range from unsophisticat- ed substitution ciphers to state-of-the- art tactical encryption schemes. Knowledge of a specific system, code, or cipher depends on your Security Clearance (p. 82) and allegiances (national, administrative, or both). In many settings, some level of Security Clearance is a prerequisite to learning this skill at all.\nTreat an attempt to break an unknown code as a Quick Contest of Cryptography skill between the code- breaker and code-maker. The code- breaker must win to break the code. Repeated attempts are possible, but each attempt takes a day. The code- maker rolls only once, when he first creates the code.\nThose with Cryptography skill may take an optional specialty (p. 169) in making or breaking codes. (The code- breaking specialty is often called “cryptanalysis.”)\nCryptography normally has no IQ default, with two exceptions. Anyone can devise a trivial code or cipher by making an IQ-5 roll. This won’t stall a professional for long, of course. Likewise, anyone can make an IQ-5 roll to attempt to break such a trivial code (but not a code devised by some- one with Cryptography skill), using the Quick Contest system described above.", "modifiers": "Mathematical Ability (p. 90). The code-breaker is at +5 if he has a sample of the code with translation, and -5 if the message to be decoded is shorter than 25 words. The code- maker receives a bonus for the time taken to create the code:  consult the Size and Speed/Range Table (p. 550), look up the time in days in the Range/Speed column (substituting “days” for “yards”), and use the corresponding bonus.", "notes": "Includes Mathematics (Cryptology)"}, "Dancing": {"default": -4, "grants": ["Choreography"], "description": "This is the ability to perform dances appropriate to your own culture, and to learn new dances quickly. Note that certain physical handicaps make this skill effectively impossible!\nExotic dances abound in fiction and history:  blade dancing, bull danc- ing, fire dancing, snake dancing, etc.", "modifiers": "Cultural Familiarity modifiers (p. 23); -5 if the dance is unfamiliar (a dance is familiar once you have successfully performed it three times).", "notes": ""}, "Detect Lies": {"default": -5, "grants": ["Body Language"], "description": "This is the ability to tell when someone is lying to you. It is not the same as Interrogation (p. 202); Detect Lies works in a casual or social situa- tion. When you ask to use this skill, the GM rolls a Quick Contest of your Detect Lies skill vs. your subject’s IQ (or Fast-Talk or Acting skill). If you win, the GM tells you whether the subject is lying. If you lose, the GM may lie to you about whether you were lied to . . . or just say, “You can’t tell.”", "modifiers": "+1 for Sensitive or +3 for Empathy (p. 51), or -3 for Low Empathy (p. 142); +4 if your subject is Easy to Read (p. 134).", "notes": ""}, "Diagnostics": {"default": -5, "grants": [], "description": "This is the ability to tell what is wrong with a sick or injured person, or what killed a dead person. A successful roll gives some information about the patient’s problem – limited to realistic knowledge for your tech level. It might not determine the exact problem (if the GM feels the cause is totally beyond your experience, for instance), but it always gives hints, rule out impossibilities, etc. No Diagnosis roll is required for obvious things, like open wounds and missing limbs!", "modifiers": "Equipment modifiers (p. 345); physiology modifiers (p. 181); -5 for internal injuries; -5 or more for a rare disease.", "notes": ""}, "Diplomacy": {"default": -5, "grants": ["Politics"], "description": "This is the skill of negotiating, compromising, and getting along with others. You may substitute a Diplomacy roll for any reaction roll in a noncombat situation, as described under Influence Rolls (p. 359).\nUnlike other Influence skills, Diplomacy never gives a worse result than if you had tried an ordinary reac- tion roll. Failure with Fast-Talk or Sex Appeal alienates the subject, but Diplomacy is usually safe.\nA successful roll also allows you to predict the possible outcome of a course of action when you are negoti- ating, or to choose the best approach to take.\nIf you know Diplomacy at level 20 or better, you get a +2 bonus on all reaction rolls!", "modifiers": "+2 for Voice (p. 97); -3 for Low Empathy (p. 142); -1 for Oblivious (p. 146); -1 to -4 for Shyness (p. 154); -2 for Stuttering (p. 157).", "notes": ""}, "Directing": {"default": -4, "grants": [], "description": "The ability to direct a group of actors. Opera and theater are different familiarities.", "modifiers": "", "notes": "Was specialty of Group Performance (p.198)"}, "Disguise": {"default": -4, "grants": ["Makeup"], "description": "This is the art of altering your appearance using clothing, makeup, and prosthetics. You do not need this skill to don a quick disguise – e.g., to put on a lab coat when you enter a lab- oratory – but such disguises only fool the inattentive! A good disguise requires a Disguise roll and 30 minutes to an hour of preparation.\nRoll a Quick Contest of Disguise skill vs. the Perception of each person your disguise must fool. Individuals with Observation or Streetwise skill may substitute those skills for Perception when rolling to penetrate a disguise. The GM may allow other skills to be of use – for instance, Physician skill might help spot a rubber nose.\nWhen combining Acting (p. 174) with Disguise (that is, when you must change your face and your personality), you need only make one roll for each person or group – but it must be the harder of the two rolls.", "modifiers": "Equipment modifiers (p. 345). You are at -1 to -5 to disguise yourself as someone very different from you (GM’s discretion). Distinctive appearance also gives a penalty – see Build (p. 18). Differences in Size Modifier usually make Disguise impossible.", "notes": ""}, "Dreaming": {"default": -5, "grants": [], "description": "This is the skill of controlling and remembering your dreams. A successful skill roll lets you experience vivid dreams about a subject of your choosing. Use the Fortune-Telling (Dream Interpretation) skill to interpret your dreams. In some game worlds, this might be a useful divinatory technique (GM’s decision).\nA Dreaming roll can also help you recall a previously forgotten piece of information, or something you witnessed but did not consciously note. This technique is much less reliable than Eidetic Memory (p. 51), though. The GM will describe your dreams to you, working clues into the narrative. It is up to you, the player, to spot these hints!\nFinally, you can use this skill to combat malign supernatural influences on your dreams. Resolve this as a Quick Contest between your Dreaming skill and your harasser’s skill at dream control. If you win, you shut out the external influence.", "modifiers": "", "notes": ""}, "Economics": {"default": -5, "grants": ["Algebra", "Merchant"], "description": "This is the study of the theory of money, markets, and financial systems. It is mainly an academic skill, but a successful skill roll allows you to predict the economic impact of events in the game world, for example the assassination of a political figure, the demolition of a gold mine, the introduction of a new invention, etc. On a practical level it also helps with managing money. A successful skill roll lets you broker a financial deal, raise capital for a new corporation, balance a budget, etc.", "modifiers": "Business Acumen and Mathematical Ability (p.90) both provide a bonus.", "notes": "Includes Finance (p.195)"}, "Engineering (Artillery)": {"default": -5, "grants": ["Armoury (Missile Weapons)", "Engineering (Combat)", "Mechanic"], "description": "This is the ability to design ballistas, catapults and similar artillery. A successful roll lets you design a new system, diagnose a glitch, identify the purpose of a strange device, or improvise a gadget to solve a problem. Time required for each attempt is up to the GM.\nNote that engineers are designers and inventors; they are not necessarily skilled at the routine operation or maintenance of the things they design!", "modifiers": "Equipment modifiers (p.345). Up to +5 to build a gadget if you can give the GM a good descrip- tion of what you want it to do.", "notes": ""}, "Engineering (Clockwork)": {"default": -5, "grants": [], "description": "This is the ability to design wind-up gadgetry – watches, mechanical men, and the like. A successful roll lets you design a new system, diagnose a glitch, identify the purpose of a strange device, or improvise a gadget to solve a problem. Time required for each attempt is up to the GM.\nNote that engineers are designers and inventors; they are not necessarily skilled at the routine operation or maintenance of the things they design!.", "modifiers": "Equipment modifiers (p.345). Up to +5 to build a gadget if you can give the GM a good descrip- tion of what you want it to do.", "notes": ""}, "Engineering (Combat)": {"default": -5, "grants": ["Engineering (Artillery)", "Engineering (Gunpowder)", "Mechanic"], "description": "This is the ability to design, build and and remove fortifications, trenches, etc. A successful roll lets you design a new system, diagnose a glitch, identify the purpose of a strange device, or improvise a gadget to solve a problem. Time required for each attempt is up to the GM.\nNote that engineers are designers and inventors; they are not necessarily skilled at the routine operation or maintenance of the things they design!", "modifiers": "Equipment modifiers (p.345). Up to +5 to build a gadget if you can give the GM a good descrip- tion of what you want it to do.", "notes": ""}, "Engineering (Gunpowder)": {"default": -5, "grants": ["Armoury (Gunpowder)", "Engineering (Combat)", "Explosives (Demolition)", "Mechanic"], "description": "This is the ability to design gunpoweder weapons and war machines. A successful roll lets you design a new system, diagnose a glitch, identify the purpose of a strange device, or improvise a gadget to solve a problem. Time required for each attempt is up to the GM.\nNote that engineers are designers and inventors; they are not necessarily skilled at the routine operation or maintenance of the things they design!", "modifiers": "Equipment modifiers (p.345). Up to +5 to build a gadget if you can give the GM a good descrip- tion of what you want it to do.", "notes": "Replaces Engineer (Small Arms) (p.190)."}, "Engineering (Mining)": {"default": -5, "grants": ["Geology"], "description": "This is the ability to design underground structures. A successful roll lets you design a new system, diagnose a glitch, identify the purpose of a strange device, or improvise a gadget to solve a problem. Time required for each attempt is up to the GM.\nNote that engineers are designers and inventors; they are not necessarily skilled at the routine operation or maintenance of the things they design!", "modifiers": "Equipment modifiers (p.345). Up to +5 to build a gadget if you can give the GM a good descrip- tion of what you want it to do.", "notes": ""}, "Erotic Art": {"default": -4, "grants": [], "description": "This represents general knowledge of advanced sexual technique. IQ-, HT-, and even ST-based rolls are common. Precise game effects are left to the GM’s discretion.", "modifiers": "+3 for Flexibility or +5 for Double-Jointed (p. 56); -3 for Killjoy (p. 140).", "notes": ""}, "Escape": {"default": -5, "grants": [], "description": "This is the ability to slip out of ropes, handcuffs, and similar restraints. The first attempt to escape takes one minute; each subsequent attempt takes 10 minutes.\nThe GM may apply a penalty for particularly secure bonds. You suffer only half these penalties if you dislocate the restrained limb (usually an arm). This requires (20 - skill) minutes of concentration, minimum one minute and a Will roll. However, if you fail your Escape roll by 3 or more when dislocating a limb, the limb suffers 1d damage. On a critical failure, you automatically take enough damage to cripple the limb!", "modifiers": "+3 for Flexibility or +5 for Double-Jointed (p. 56); any bonus for Slippery (p. 85).", "notes": ""}, "Explosives (Demolition)": {"default": -4, "grants": [], "description": "The ability to prepare and set explosives in order to blow things up. Make a roll whenever you use explosives in this way. A failure indicates an error. The gravity of the error depends on the amount by which you failed; a badly failed roll in close quarters can blow you up! Time required varies – it takes only a cou- ple of seconds to set a prepared charge, but it might take hours to demolish a large bridge or a sky- scraper. When setting an explosive trap, use this skill rather than Traps. Rolls to set a “trap” fuse (e.g., a land mine) instead of a timed fuse are at -2. Defaults:  Engineer (Combat) or (Mining) at -3.", "modifiers": "Equipment modifiers (p. 345); -1 to -5 for distractions (e.g., enemy fire or swarms of biting ants) or physical motion (e.g., a rocking boat or speeding bus). The time modifiers under Time Spent (p. 346) will often apply.", "notes": ""}, "Falconry": {"default": -4, "grants": [], "description": "This is the skill of “hawking”:  hunting small game with a trained hawk. It includes knowledge of hunting and training techniques, as well as how to care for a falcon. Finding a wild falcon’s nest in spring requires a week’s search and a successful Falconry roll; a nest has 1d-3 chicks.", "modifiers": "", "notes": ""}, "Farming": {"default": -4, "grants": ["Gardening"], "description": "This is the skill of growing things. It is usually used to earn a living, but you can also use it to answer theoreti- cal questions about or solve problems related to agriculture.", "modifiers": "", "notes": ""}, "Fast-Draw (Ammunition)": {"default": -3, "grants": [], "description": "This skill lets you quickly draw a weapon from its holster, sheath, or hiding place. A successful roll means you ready the weapon instantly. This does not count as a combat maneuver; you can use the weapon to attack on the same turn. On a failure, you ready your weapon normally but may do nothing else on your turn. A critical failure means you drop the weapon.\nThe Ammunition specialty lets you ready a single arrow, bolt, or dart instantly. This reduces the time required to reload a bow, crossbow, or blowgun by one second. Failure means you drop the arrow or bolt, or accidentally discard one round of ammunition. On a critical failure, you drop the entire quiver, scattering loose ammunition everywhere!", "modifiers": "Combat Reflexes (p.43) gives +1 to all Fast-Draw specialties; Ham-Fisted (p.138) gives -3 per level.", "notes": "Default added."}, "Fast-Draw (Melee Weapon)": {"default": -3, "grants": [], "description": "This skill lets you quickly draw a weapon from its holster, sheath, or hiding place. A successful roll means you ready the weapon instantly. This does not count as a combat maneuver; you can use the weapon to attack on the same turn. On a failure, you ready your weapon normally but may do nothing else on your turn. A critical failure means you drop the weapon.\nThe Ammunition specialty lets you ready a single arrow, bolt, or dart instantly. This reduces the time required to reload a bow, crossbow, or blowgun by one second. Failure means you drop the arrow or bolt, or accidentally discard one round of ammunition. On a critical failure, you drop the entire quiver, scattering loose ammunition everywhere!", "modifiers": "Combat Reflexes (p.43) gives +1 to all Fast-Draw specialties; Ham-Fisted (p.138) gives -3 per level.", "notes": "Default added."}, "Fast-Draw (Thrown Weapon)": {"default": -3, "grants": [], "description": "This skill lets you quickly draw a weapon from its holster, sheath, or hiding place. A successful roll means you ready the weapon instantly. This does not count as a combat maneuver; you can use the weapon to attack on the same turn. On a failure, you ready your weapon normally but may do nothing else on your turn. A critical failure means you drop the weapon.\nThe Ammunition specialty lets you ready a single arrow, bolt, or dart instantly. This reduces the time required to reload a bow, crossbow, or blowgun by one second. Failure means you drop the arrow or bolt, or accidentally discard one round of ammunition. On a critical failure, you drop the entire quiver, scattering loose ammunition everywhere!", "modifiers": "Combat Reflexes (p.43) gives +1 to all Fast-Draw specialties; Ham-Fisted (p.138) gives -3 per level.", "notes": "Default added."}, "Fast-Talk": {"default": -4, "grants": [], "description": "This is the skill of talking others into doing things against their better judgment. It is not taught (intentionally, that is) in school; you study it by working as a salesman, confidence man, lawyer, etc. In any situation that calls for a reaction roll, you may make an Influence roll against Fast-Talk instead; see Influence Rolls (p. 359).\nIf you have Fast-Talk at level 20 or better, you get +2 on all reaction rolls where you’re allowed to talk!\nNote that Fast-Talk differs from Acting (p. 174). In general, Fast-Talk is used to get someone to make a snap decision in your favor, while Acting is used for long-term dissimulation. However, there are situations in which the GM could allow a roll on either skill.", "modifiers": "+2 for Voice (p. 97); -3 for Low Empathy (p. 142); -1 for Oblivious (p. 146); -1 to -4 for Shyness (p. 154); -2 for Stuttering (p. 157); -5 for Truthfulness (p. 159). The GM may ask you for details of the story you are using, rather than just let you say, “I’m using Fast-Talk.” Your approach and the plausibility of the story may fur- ther modify the roll, at the GM’s dis- cretion.", "notes": ""}, "Filch": {"default": -4, "grants": ["Pickpocket", "Sleight of Hand"], "description": "This skill lets you steal objects that are sitting in plain sight . . . without being spotted. Roll against skill to shoplift, snatch documents off a desk, etc. If someone is actively watching the item you wish to snatch, you must win a Quick Contest of Filch vs. his Vision roll (or Observation skill, p. 211) to perform the theft unnoticed.\nFilch only covers the theft itself. The GM might require rolls against Stealth to get close enough to make the attempt and Holdout to conceal stolen objects afterward.", "modifiers": "+3 if the light is dim; +3 if you have a confederate to distract attention.", "notes": ""}, "First Aid": {"default": -3, "grants": [], "description": "This is the ability to patch up an injury in the field (see Recovery, p. 423). Make a skill roll to halt bleed- ing, suck out poison, give artificial respiration to a drowning victim, etc. Unusual problems must be identified using Diagnosis skill first.", "modifiers": "Equipment modifiers (p. 345); physiology modifiers (p. 181).", "notes": ""}, "Fishing": {"default": -3, "grants": [], "description": "This is the ability to catch fish – with a net, hook and line, or whatever method is used in your culture. If you have proper equipment and there are fish to be caught, a successful roll catches them. If you lack equipment, you can improvise.", "modifiers": "Equipment modifiers (p. 345).", "notes": ""}, "Forced Entry": {"default": -3, "grants": [], "description": "This is the ability to kick in doors and windows, or demolish them with a crowbar, ram, or sledgehammer, without necessarily being adept at melee combat. Make a skill roll to hit an inanimate object with your foot or an impact weapon. Add +1 per die to basic thrust or swing damage if you have this skill at DX+1, +2 per die if you know it at DX+2 or better. Add a similar bonus (+1 or +2) to ST rolls made for forced entry. The damage bonus also applies when you use Melee Weapon skills to wreck inani- mate objects out of combat.\nFor subtle break-ins, use Lockpicking skill (p. 206).", "modifiers": "", "notes": ""}, "Forensics": {"default": -5, "grants": [], "description": "This is the ability to apply the principles of forensic science and crimi- nalistics, such as the computation of bullet paths and the microscopic or chemical analysis of clues. Some dis- ciplines require other skills. For instance, a forensic pathologist performing an autopsy would roll against Surgery skill.", "modifiers": "", "notes": "Streetwise replaces Criminology as a default."}, "Forgery": {"default": -5, "grants": ["Counterfeinting"], "description": "This is the ability to create falsified documents (identity cards, passports, etc.). It is not taught except by intelligence agencies and the underworld – although you can always study it on your own.\nThe time required to create a forgery ranges from days to weeks (GM decides). When you use a forged document, make your Forgery roll each time it is inspected – unless you roll a critical success on your first attempt. Failure means someone spots the for- gery.\nSome tasks require DX-based skill rolls, in which case modifiers for High Manual Dexterity (p. 59) or Ham-Fisted (p. 138) apply. The GM may allow Forgery to default to a suitable Artist specialty at -5 if you are doing the work entirely by hand.", "modifiers": "Equipment modifiers (p. 345); +3 if you merely altered a gen- uine document; -5 if you did not have a sample to copy. The GM may also assign modifiers based on the severity of the inspection; a routine border check, for instance, would give a +5 bonus.", "notes": ""}, "Forward Observer": {"default": -4, "grants": ["Siege (Chemical)", "Siege (Mechanical)"], "description": "This is the skill of being a “spotter” for artillery. It includes locating targets with map and compass, marking targets (using smoke, etc.), matching ordnance to target for best effect, and calling in corrections to any fire you personally observe. Failure means the ordnance misses the target; critical failures result in severe “collateral damage” or “friendly fire” incidents. The very worst critical failures (GM’s decision) drop the ordnance on your position!", "modifiers": "Equipment modifiers (p. 345); -2 if you are unfamiliar with the artillery; -3 per 500 meters between you and the target – but divide the actual range by the magnifi- cation of any vision aid first.", "notes": ""}, "Freight Handling": {"default": -4, "grants": [], "description": "This is the skill of supervising the loading and unloading of vehicles (laborers do not require this skill – just their foreman). A successful skill roll cuts the time required by 20%. Also roll against Freight Handling skill any time there is doubt as to whether an item of cargo was lost or damaged; on a success, it made the journey intact.", "modifiers": "", "notes": ""}, "Gambling": {"default": -4, "grants": [], "description": "This is skill at playing games of chance. A successful Gambling roll can (among other things) tell you if a game is rigged, identify a fellow gambler in a group of strangers, or “estimate the odds” in any tricky situation. When you gamble against the house, make a skill roll (the GM will secretly modify this roll if the odds are poor!). When you gamble against someone else, roll a Regular Contest of Gambling until one of you wins.\nSleight of Hand skill (p. 221) is helpful if you want to cheat! To spot a cheater, roll a Quick Contest of your Gambling or Vision roll, whichever is higher, vs. your opponent’s Sleight of Hand skill (for card or dice tricks) or IQ (for other kinds of cheating).", "modifiers": "+1 to +5 for familiarity with the game being played; -1 to -5 if the game is rigged against you; -3 for Killjoy (p. 140), since you don’t care if you win or lose.", "notes": "No Mathematics (Statistics) default, since they won't develop for another 3-4 centuries. Maybe make this skill a math specialty as a primitive form of statistics, like physics and applied math."}, "Gardening": {"default": -3, "grants": ["Farming"], "description": "This is the ability to care for plants on a small scale. (For large-scale crops, use Farming skill, p.194). A skill roll lets you grow food, medicinal herbs, attractive flowers and trees, etc.", "modifiers": "-2 to -4 for an unfamiliar method (e.g., hydroponics or bonsai when you’re used to your back yard), crop (herbs, trees, and vegetables all differ), or geographical region. These three penalties are cumulative!", "notes": ""}, "Geology": {"default": -5, "grants": ["Engineering (Mining)", "Prospecting"], "description": "This is the science dealing with the structure of planets – their crust, man- tle, and core. A geologist knows about minerals, oil, ores, etc.; about earth- quakes and volcanoes; and about fos- sils. In the field, he can attempt to find water by using an “eye for country” (see Survival, p. 223).", "modifiers": "", "notes": "No specialty necessary."}, "Geometry": {"default": -5, "grants": [], "description": "This skill is concerned with properties of space that are related with distance, shape, size, and relative position of figures. It is exclusively devoted to Euclidean geometry, which includes the notions of point, line, plane, distance, angle, surface, and curve, as fundamental concepts.", "modifiers": "", "notes": "Replaces Mathematics specialties."}, "Gesture": {"default": -3, "grants": [], "description": "This is the ability to communicate through improvised hand signals. A successful skill roll will let you convey one simple idea to another person, or understand one simple idea he is attempting to get across to you. Gesture is not suited to complex communication, however.", "modifiers": "Cultural Familiarity modifiers (p. 23) definitely apply! Different cultures develop distinct ges- ture vocabularies.", "notes": ""}, "Heraldry": {"default": -4, "grants": [], "description": "This is the skill of recognising and designing coats of arms, crests, flags, tartans, and other emblems. A successful roll lets you recognise a knight or a noble from his banner or shield, create attractive and proper arms (without conflicting with existing designs), etc.", "modifiers": "Cultural Familiarity modifiers (p. 23). Up to +5 to recognise a well-known design, and down to -5 for an obscure design or one that was retired long ago.", "notes": ""}, "Hiking": {"default": -4, "grants": [], "description": "This skill represents training for endurance walking, hiking, and marching. It includes knowledge of how to pace yourself in different conditions, and how best to carry a pack. Make a Hiking roll before each day’s march; on a success, increase the distance traveled by 20%. The GM may allow bonuses for good maps and good walking shoes, but not for terrain. If a party is traveling together, all must make the Hiking roll in order to get the increased distance. See Hiking (p.351).", "modifiers": "", "notes": ""}, "History (Bronze Age)": {"default": -5, "grants": [], "description": "This is the study of the recorded past from 3300 BCE until 1200 BCE. A successful skill roll lets you answer questions about history, and might (at the GM’s option) allow you to remember a useful parallel:  “Ah, yes. Hannibal faced a situation like this once, and here’s what he did...”\nYou must specialise. In general, if two specialties overlap at all, then GM should permit a default at -2 to -4.", "modifiers": "", "notes": "Includes Archaeology (p.176)"}, "History (Archaic Period)": {"default": -5, "grants": [], "description": "This is the study of the recorded past from 1200 BCE until 6th century BCE. A successful skill roll lets you answer questions about history, and might (at the GM’s option) allow you to remember a useful parallel:  “Ah, yes. Hannibal faced a situation like this once, and here’s what he did...”\nYou must specialise. In general, if two specialties overlap at all, then GM should permit a default at -2 to -4.", "modifiers": "", "notes": "Includes Archaeology (p.176)"}, "History (Classical Antiquity)": {"default": -5, "grants": [], "description": "This is the study of the recorded past from 5th century BCE until 27 BCE. A successful skill roll lets you answer questions about history, and might (at the GM’s option) allow you to remember a useful parallel:  “Ah, yes. Hannibal faced a situation like this once, and here’s what he did...”\nYou must specialise. In general, if two specialties overlap at all, then GM should permit a default at -2 to -4.", "modifiers": "", "notes": "Includes Archaeology (p.176)"}, "History (Roman Empire)": {"default": -5, "grants": [], "description": "This is the study of the recorded past from 27 BCE until 476 CE. A successful skill roll lets you answer questions about history, and might (at the GM’s option) allow you to remember a useful parallel:  “Ah, yes. Hannibal faced a situation like this once, and here’s what he did...”\nYou must specialise. In general, if two specialties overlap at all, then GM should permit a default at -2 to -4.", "modifiers": "", "notes": "Includes Archaeology (p.176)"}, "History (Dark Ages)": {"default": -5, "grants": [], "description": "This is the study of the recorded past from 476 CE until 793 CE. A successful skill roll lets you answer questions about history, and might (at the GM’s option) allow you to remember a useful parallel:  “Ah, yes. Hannibal faced a situation like this once, and here’s what he did...”\nYou must specialise. In general, if two specialties overlap at all, then GM should permit a default at -2 to -4.", "modifiers": "", "notes": "Includes Archaeology (p.176)"}, "History (Viking Age)": {"default": -5, "grants": [], "description": "This is the study of the recorded past from 793 CE until 1066 CE. A successful skill roll lets you answer questions about history, and might (at the GM’s option) allow you to remember a useful parallel:  “Ah, yes. Hannibal faced a situation like this once, and here’s what he did...”\nYou must specialise. In general, if two specialties overlap at all, then GM should permit a default at -2 to -4.", "modifiers": "", "notes": "Includes Archaeology (p.176)"}, "History (Early Middle Ages)": {"default": -5, "grants": [], "description": "This is the study of the recorded past from 1066 CE until now (1300 CE). A successful skill roll lets you answer questions about history, and might (at the GM’s option) allow you to remember a useful parallel:  “Ah, yes. Hannibal faced a situation like this once, and here’s what he did...”\nYou must specialise. In general, if two specialties overlap at all, then GM should permit a default at -2 to -4.", "modifiers": "", "notes": "Includes Archaeology (p.176)"}, "Holdout": {"default": -4, "grants": [], "description": "This is the skill of concealing items on your person or on other people (usually with their cooperation). An item’s size and shape govern its concealability. Some examples: \n+4:  A BB-sized jewel, a postage stamp.\n+3:  A pea-sized jewel.\n+2:  One lockpick, a huge jewel, a dime, a letter.\n+1:  A set of lockpicks, a silver dollar.\n0:  A small personal mirror, a small pouch\n-1:  A dagger, a slingshot, the tiniest handgun or grenade.\n-2:  A large knife.\n-3:  A shortsword.\n-4:  A broadsword.\n-5:  A bastard sword.\n-6:  A crossbow.\nThings that move or make noise give an additional -1 or more to skill.\nClothing also modifies effective skill. A nun in full habit (+5 to skill) could conceal a battle axe from an eyeball search. A prostitute on a inside a brothel (-5 to skill) would have trouble hiding even a dagger. Of course, the prostitute might escape search entirely (unless the guards were bored) because “she obviously couldn’t hide anything in that outfit!” Full nudity is -7 to skill.\nA proper concealment holster helps conceal a weapon; use the equipment modifiers (p.345). Clothing designed specifically to hide things gives a bonus of up to +4.\nTo spot a concealed item, roll a Quick Contest of Search skill vs. Holdout. Search defaults to Perception-5 if you haven’t studied it. See Search (p.219) for additional rules.", "modifiers": "", "notes": ""}, "Housekeeping": {"default": -3, "grants": ["Cooking"], "description": "This is the ability to manage a household. It covers both home economics and domestic chores:  cleaning, cooking (but not haute cuisine, which requires the Cooking skill), minor repairs (any routine mainte- nance task that calls for a roll against Carpentry, Sewing, or a similar skill at +4 or better), etc. The main use of Housekeeping is to qualify for the job of “homemaker,” but it can come in handy on adventures – for instance, to clean up evidence!", "modifiers": "", "notes": ""}, "Intelligence Analysis": {"default": -5, "grants": ["Strategy"], "description": "This is the ability to analyze and interpret intelligence data. It allows you to deduce enemy plans and capabilities, evaluate the accuracy of information, rate the reliability of sources, etc. In most game worlds, only intelligence, military, and security services teach this skill – often only to those with a minimum level of Rank or Security Clearance.\nThe GM makes all Intelligence Analysis rolls in secret. On a success, he provides details about the significance and accuracy of your data, or insights into what it means in terms of enemy planning. When you encounter deliberately falsified data, the GM rolls a secret Quick Contest:  your Intelligence Analysis vs. the enemy’s skill at disinformation (Forgery, Propaganda, etc.). If you win, the GM provides details on precisely what is wrong with the information. It is up to you to deduce what this means, however!\nThis skill has nothing to do with gathering intelligence. Use Current Affairs (p.186) and Research (p. 217) to sift through public sources; Forensics (p. 196) and Search (p. 219) to find physical clues; Observation (p. 211) for human surveillance.", "modifiers": "-1 to -5 for incomplete information; -3 if all your information comes from a single source; -3 for intelligence concerning an arcane sci- entific or bureaucratic principle, unless you have skill in that area (e.g., Engineer (Electronics) for intelligence regarding a radar installation).", "notes": ""}, "Interrogation": {"default": -4, "grants": [], "description": "This is the ability to question a prisoner. Only intelligence agencies, police and prison services, the military, and the underworld teach this skill.\nRoll a Quick Contest of Interrogation vs. the prisoner’s Will for each question. This requires 5 minutes per question. If you win, you get a truthful answer. If you tie or lose, the victim remains silent or lies. If you lose by more than five points, he tells you a good, believable lie! The GM roleplays the prisoner (or, if you are the prisoner, the GM will roleplay the interrogator) and makes all die rolls in secret.", "modifiers": "-5 if the prisoner’s loyal- ty to his leader or cause is “Very Good” or “Excellent”; -3 for Low Empathy (p.142); +2 for a lengthy interrogation (over two hours); +3 if you use severe threats; +6 if you use torture. Increase these last two bonuses by +1 if you have the Callous disadvantage (p.125)!\n“Torture” does not necessarily mean thumbscrews and the rack. Exposing a prisoner to the object of his phobia (see Phobias, p.148) is an effec- tive torture, as is a believable threat against a loved one. Note that tortur- ing a prisoner is usually considered vile behavior, likely bringing retribution.", "notes": ""}, "Intimidation": {"default": -4, "grants": ["Interrogation"], "description": "This is the skill of hostile persuasion. The essence of Intimidation is to convince the subject that you are able and willing, perhaps even eager, to do something awful to him.\nYou can substitute an Intimidation attempt for any reaction roll; see Influence Rolls (p. 359). Exception:  You cannot intimidate someone who has the Unfazeable advantage!\nThe results of a successful Intimidation attempt depend on the target. An honest citizen probably cooperates, sullenly or with false cheer. A low-life might lick your boots (even becoming genuinely loyal). A really tough sort might react well without being frightened:  “You’re my kind of scum!” The GM decides, and roleplays it. If you rolled a critical suc- cess – or if the subject critically failed his Will roll – your victim must make a Fright Check in addition to the other results of the Influence roll!\nGroup Intimidation:  You may attempt to intimidate up to 25 people at once, at -1 to skill per five people (or fraction thereof) in the group. Multiple intimidators can attempt to intimidate proportionally larger groups; for instance, three thugs could try to intimidate up to 75 people! Base the skill penalty on the size of the tar- get group divided by the number of intimidators (round up). Resolve the outcome with a single Quick Contest:  the highest effective Intimidation skill from among the intimidators vs. the highest modified Will in the target group.\nSpecious Intimidation:  You can attempt a Quick Contest of Fast-Talk vs. the subject’s IQ before your Intimidation attempt in order to appear to be intimidating when you can’t back it up. If you win, you are at +3 on the subsequent Intimidation attempt, which can go a long way toward offsetting the high Will and Fearlessness of martial arts masters, world leaders, etc. If you tie or lose, however, your Intimidation attempt fails automatically, and you suffer a “Very Bad” reaction instead of just a “Bad” one!", "modifiers": "+1 to +4 for displays of strength, bloodthirstiness, or supernat- ural powers (GM’s judgment); increase this bonus by +1 if you are Callous (p.125). Appearance (p.21) matters:  +2 if you are Hideous, +3 if Monstrous, or +4 if Horrific. Size also matters:  add your Size Modifier and subtract the subject’s. Appropriate Reputation mod- ifiers (positive or negative) certainly count! You get -1 for Oblivious (p.146) and -1 to -4 for Shyness (p.154). Subtract the subject’s Fearlessness (p.55) from your roll. The GM may assign a +1 or -1 for especially appro- priate or clumsy dialog. Requests for aid are always at -3 or worse.", "notes": ""}, "Jeweler": {"default": -5, "grants": [], "description": "This is the ability to work with precious metals, make jewelry, decorate weapons, etc. A successful skill roll allows you to identify a precious metal or gem, or determine the value of a precious bauble.", "modifiers": "", "notes": ""}, "Jumping": {"default": -3, "grants": [], "description": "This skill represents trained jumping ability. When you attempt a diffi- cult jump, roll against the higher of Jumping or DX. In addition, you may use half your Jumping skill (round down) instead of Basic Move when calculating jumping distance. For instance, Jumping-14 would let you jump if you had Basic Move 7. See Jumping (p.352).", "modifiers": "", "notes": ""}, "Knot-Tying": {"default": -3, "grants": [], "description": "This is the ability to tie a wide variety of knots quickly and efficiently. A successful skill roll lets you make a noose, tie someone up, etc. If you bind someone using this skill, he must win a Quick Contest of Escape vs. your Knot-Tying skill to free himself.", "modifiers": "+1 per level of High Manual Dexterity (p.59), or -3 per level of Ham-Fisted (p.138).", "notes": ""}, "Language (Romance/Italic/Istro-Dalmatian)": {"default": -6, "grants": ["Language (Romance/Italic/Latin)", "Language (Romance/Italic/Lombard)", "Language (Romance/Italic/Neapolitan)", "Language (Romance/Italic/Sicilian)", "Language (Romance/Italic/Tuscan)", "Language (Romance/Italic/Venetian)", "Language (Romance/Occitan/Aquitaine)", "Language (Romance/Occitan/Catalan-Aragonese)", "Language (Romance/Occitan/Provencal)", "Language (Romance/Frankish/Burgundian)", "Language (Romance/Frankish/Norman)", "Language (Romance/Frankish/Parisian)", "Language (Romance/Romanian/Moldavian)", "Language (Romance/Romanian/Transylvanian)", "Language (Romance/Romanian/Vlach)", "Literacy (Latin)"], "description": "The ability to express oneself verbally and comprehend others audiably in a particular language. The default applies only to one's native language. Both participants roll once each time they converse summing their scores.\nSuccess implies that they can understand eachother at a native level; -1 represent accented comprehension, missing some finer details of the context of the conversation; -2 is broken communication only some verbs and nouns can be understood by each party; -3 and means below means that the participant can not understand each other at all.\nFinally, almost all language have regional dialects imposing a -1 penalty.", "modifiers": "", "notes": ""}, "Language (Romance/Italic/Latin)": {"default": -6, "grants": ["Language (Romance/Italic/Istro-Dalmatian)", "Language (Romance/Italic/Lombard)", "Language (Romance/Italic/Neapolitan)", "Language (Romance/Italic/Sicilian)", "Language (Romance/Italic/Tuscan)", "Language (Romance/Italic/Venetian)", "Language (Romance/Occitan/Aquitaine)", "Language (Romance/Occitan/Catalan-Aragonese)", "Language (Romance/Occitan/Provencal)", "Language (Romance/Frankish/Burgundian)", "Language (Romance/Frankish/Norman)", "Language (Romance/Frankish/Parisian)", "Language (Romance/Romanian/Moldavian)", "Language (Romance/Romanian/Transylvanian)", "Language (Romance/Romanian/Vlach)", "Literacy (Latin)"], "description": "The ability to express oneself verbally and comprehend others audiably in a particular language. The default applies only to one's native language. Both participants roll once each time they converse summing their scores.\nSuccess implies that they can understand eachother at a native level; -1 represent accented comprehension, missing some finer details of the context of the conversation; -2 is broken communication only some verbs and nouns can be understood by each party; -3 and means below means that the participant can not understand each other at all.\nFinally, almost all language have regional dialects imposing a -1 penalty.", "modifiers": "", "notes": ""}, "Language (Romance/Italic/Lombard)": {"default": -6, "grants": ["Language (Romance/Italic/Istro-Dalmatian)", "Language (Romance/Italic/Latin)", "Language (Romance/Italic/Neapolitan)", "Language (Romance/Italic/Sicilian)", "Language (Romance/Italic/Tuscan)", "Language (Romance/Italic/Venetian)", "Language (Romance/Occitan/Aquitaine)", "Language (Romance/Occitan/Catalan-
