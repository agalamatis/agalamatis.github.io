ng/Mandolin)", "Musical Instrument (String/Rebec)"], "description": "This is the ability to play a musical instrument. With a successful skill roll, you give a competent performance. It also includes the ability to read music in your culture’s notation system (if any). Treat different systems as familiarities (see Familiarity, p.169). You must specialise in a particular instrument. Defaults between specialties of the same group are at -3.", "modifiers": "", "notes": ""}, "Musical Instrument (String/Harp)": {"default": -6, "grants": ["Musical Composition", "Musical Instrument (String/Citole)", "Musical Instrument (String/Dulcimer)", "Musical Instrument (String/Fiddle)", "Musical Instrument (String/Gittern)", "Musical Instrument (String/Guitarra latina)", "Musical Instrument (String/Hurdy-gurdy)", "Musical Instrument (String/Lute)", "Musical Instrument (String/Mandolin)", "Musical Instrument (String/Rebec)"], "description": "This is the ability to play a musical instrument. With a successful skill roll, you give a competent performance. It also includes the ability to read music in your culture’s notation system (if any). Treat different systems as familiarities (see Familiarity, p.169). You must specialise in a particular instrument. Defaults between specialties of the same group are at -3.", "modifiers": "", "notes": ""}, "Musical Instrument (String/Hurdy-gurdy)": {"default": -6, "grants": ["Musical Composition", "Musical Instrument (String/Citole)", "Musical Instrument (String/Dulcimer)", "Musical Instrument (String/Fiddle)", "Musical Instrument (String/Gittern)", "Musical Instrument (String/Guitarra latina)", "Musical Instrument (String/Harp)", "Musical Instrument (String/Lute)", "Musical Instrument (String/Mandolin)", "Musical Instrument (String/Rebec)"], "description": "This is the ability to play a musical instrument. With a successful skill roll, you give a competent performance. It also includes the ability to read music in your culture’s notation system (if any). Treat different systems as familiarities (see Familiarity, p.169). You must specialise in a particular instrument. Defaults between specialties of the same group are at -3.", "modifiers": "", "notes": ""}, "Musical Instrument (String/Lute)": {"default": -6, "grants": ["Musical Composition", "Musical Instrument (String/Citole)", "Musical Instrument (String/Dulcimer)", "Musical Instrument (String/Fiddle)", "Musical Instrument (String/Gittern)", "Musical Instrument (String/Guitarra latina)", "Musical Instrument (String/Harp)", "Musical Instrument (String/Hurdy-gurdy)", "Musical Instrument (String/Mandolin)", "Musical Instrument (String/Rebec)"], "description": "This is the ability to play a musical instrument. With a successful skill roll, you give a competent performance. It also includes the ability to read music in your culture’s notation system (if any). Treat different systems as familiarities (see Familiarity, p.169). You must specialise in a particular instrument. Defaults between specialties of the same group are at -3.", "modifiers": "", "notes": ""}, "Musical Instrument (String/Mandolin)": {"default": -6, "grants": ["Musical Composition", "Musical Instrument (String/Citole)", "Musical Instrument (String/Dulcimer)", "Musical Instrument (String/Fiddle)", "Musical Instrument (String/Gittern)", "Musical Instrument (String/Guitarra latina)", "Musical Instrument (String/Harp)", "Musical Instrument (String/Hurdy-gurdy)", "Musical Instrument (String/Lute)", "Musical Instrument (String/Rebec)"], "description": "This is the ability to play a musical instrument. With a successful skill roll, you give a competent performance. It also includes the ability to read music in your culture’s notation system (if any). Treat different systems as familiarities (see Familiarity, p.169). You must specialise in a particular instrument. Defaults between specialties of the same group are at -3.", "modifiers": "", "notes": ""}, "Musical Instrument (String/Rebec)": {"default": -6, "grants": ["Musical Composition", "Musical Instrument (String/Citole)", "Musical Instrument (String/Dulcimer)", "Musical Instrument (String/Fiddle)", "Musical Instrument (String/Gittern)", "Musical Instrument (String/Guitarra latina)", "Musical Instrument (String/Harp)", "Musical Instrument (String/Hurdy-gurdy)", "Musical Instrument (String/Lute)", "Musical Instrument (String/Mandolin)"], "description": "This is the ability to play a musical instrument. With a successful skill roll, you give a competent performance. It also includes the ability to read music in your culture’s notation system (if any). Treat different systems as familiarities (see Familiarity, p.169). You must specialise in a particular instrument. Defaults between specialties of the same group are at -3.", "modifiers": "", "notes": ""}, "Naturalist": {"default": -6, "grants": ["Farming", "Fishing", "Meteorology", "Poisons", "Survival", "Tracking"], "description": "This skill – crucial for fantasy druids and rangers – represents practical and scientific (for TL<4) knowledge of nature in its many forms. It includes just enough Biology to tell dangerous plants and animals from benign ones; just enough Geology to locate a cave to shelter in; and just enough Meteorology to know when to take shelter. Roll vs. skill to do any of these things.\nIn addition, it grants the ability to manufacture herbal concoctions that have medicinal or even magical effects – healing balms, love potions, etc. It functions much as Alchemy skill (p.174). Unlike Alchemy, it does not include the ability to analyse “elixirs”. On the other hand, an expert at this skill can locate magical ingredients for free in the wild by making a few Naturalist rolls, while an alchemist requires rare and expensive materials (such as alkahest, dragon’s blood, gemstones, and gold) to do his work.", "modifiers": "", "notes": "Includes Herb Lore (p.199) and Pharmacy (Herbal) (p.213)."}, "Observation": {"default": -4, "grants": ["Shadowing"], "description": "This is the talent of observing dangerous or “interesting” situations without letting others know that you are watching. Use this skill to monitor a location, a group of people, or your immediate surroundings for concealed or tactically significant details. This is not the same as gathering clues or making a hands-on search (use Forensics and Search, respectively) – you always use Observation from a distance.\nA successful skill roll lets you gather information that is not specifically hidden. For instance, you could case a bank for obvious cameras before a robbery, learn the schedule of sentries, estimate the size of a crowd, or gauge the strength of troops moving in the open.\nTo spot deliberately hidden details – e.g., someone trying to sneak up on you or an armed man hiding in the crowd – you must win a Quick Contest of Observation skill vs. the Stealth, Shadowing, or Camouflage skill (as appropriate) of the other party. The GM should roll the Contest in secret, and should not say, “You don’t see the machine gun nest concealed in the bushes.”\nIf your attempt fails, you get no details on an obvious item, or fail to spot a hidden one. On a critical failure, someone spots you and reacts poorly to the attention.", "modifiers": "Acute Senses (p.35), as appropriate; modifiers for cover, darkness, or size; -1 to -10 if the tar- get is concealed by high-tech camou- flage or “stealth” technology; +1 to +10 if you possess suitable surveil- lance devices (a thermograph to spot a concealed sniper, binoculars to observe troop movements, etc.) and succeed at the skill roll to operate them.", "notes": ""}, "Orienteering": {"default": -4, "grants": ["Cartography"], "description": "This is the ability to find your position through careful observation of your surroundings and the use of instrumentation. A successful roll tells you where you are or lets you plot a course. Navigation using landmarks, including indoors and underground.", "modifiers": "-1 to -10 for being in an unfamiliar area (GM’s discretion); equipment modifiers (p. 345).", "notes": "Replaces Navigation (Land)."}, "Packing": {"default": -4, "grants": [], "description": "This is the ability to get loads on and off of pack animals quickly and efficiently. It also lets you get the best performance from pack animals on the road, judge such beasts before purchase, and select the best route for a pack train. If the beasts are ornery or badly trained (GM’s judgment), you must make a successful Animal Handling roll before you can attempt a Packing roll. A caravan without at least one master packer (Packing at 15+) moves at 80% its normal speed.", "modifiers": "", "notes": ""}, "Panhandling": {"default": -3, "grants": [], "description": "This is the art of effective begging:  who to approach, how to approach them, and how to avoid legal entan- glements. Roll once per hour of beg- ging.\nOn a success, you net $20 times your margin of success. On a critical success, you get some sort of unex- pected bonus – perhaps someone buys you dinner or gives you a useful or saleable item (e.g., a raincoat or a new pair of shoes). On a failure, you receive nothing. On a critical failure, you are assaulted or have a run-in with the law.", "modifiers": "+3 for Pitiable (p. 22); -1 to -4 for Shyness (p.154). You may, if you wish, apply the opposite of your usual appearance modifier – that is, a penalty for being attractive or a bonus for being unattractive – unless you are Horrific or Monstrous (p.21). The GM may assign a bonus if there is a lot of foot traffic in the area, or a penalty if there is no one around.", "notes": ""}, "Performance": {"default": -4, "grants": ["Acting", "Public Speaking"], "description": "This is the ability to act on the stage or screen. It is different from Acting in that you are trying to impress and entertain people – not deceive them. If you studied this skill formally, it includes the knowledge expected of a professional actor from your culture and tech level (stage directions, actor-agent-producer relations, etc.).", "modifiers": "+2 for Voice (p.97); -1 to -4 for Shyness (p.154); -2 for Stuttering (p.157).", "notes": ""}, "Physician": {"default": -6, "grants": ["Diagnostics", "First Aid", "Poisons", "Surgery", "Torture"], "description": "This is the ability to aid the sick and the injured, prescribe drugs and care, etc. Make a skill roll to hasten natural recovery from injury (see Recovery, p.423), and whenever the GM requires a roll to test general medical competence or knowledge. \nIt is associated with a philosophical and/or spiritual tradition. The particulars vary by tradition, but might include bleeding, surgery, changing nutrition, resting, as well as exorcism, and even pilgrimage and prayer.\nIt is always at least as good as First Aid (p. 195) – the attentions of a trained healer of any kind are preferable to bleeding to death!", "modifiers": "", "notes": "Includes Esoteric Medicine (p.192) and Physiology (p.213)"}, "Philosophy": {"default": -6, "grants": ["Body Language", "Detect Lies", "Interrogation", "Propaganda"], "description": "This is the study of a system of principles to live by. When confronted with someone who subscribes to this philosophy, a successful Philosophy roll might provide insights into his behavior.\nYou do not necessarily believe in the ideals of the philosophy you study. Ifyoudo,youmayasktheGMto make a secret roll against your Philosophy skill when you are faced with a moral dilemma. On a success, the GM will “enlighten” you and pro- vide a hint as to which course of action “feels” right given your beliefs.", "modifiers": "+3 if you know the subject well; +3 if the subject is of a known deviant personality type; +1 for Sensitive or +3 for Empathy (p.51), or -3 for Low Empathy (p.142), if diagnosing a subject in your presence; -3 for Callous (p.125), unless specifically rolling to deduce someone’s weaknesses so you can exploit them.", "notes": "Includes Anthropology (p.175), Psychology (p.216) and Sociology (p.221). No specialty required."}, "Physics": {"default": -6, "grants": [], "description": "This is the science dealing with the properties and interactions of matter and energy. It is exclusively based on Aristotelian physics concerned with the establishment of general principles of change that govern all natural bodies, both living and inanimate, celestial and terrestrial – including all motion (change with respect to place), quantitative change (change with respect to size or number), qualitative change, and substantial change (\"coming to be\" [coming into existence, 'generation'] or \"passing away\" [no longer existing, 'corruption']).", "modifiers": "", "notes": ""}, "Pickpocket": {"default": -5, "grants": ["Filch"], "description": "This is the ability to steal a purse, knife, etc., from someone’s person – or to “plant” something on him.\nIf your victim is aware someone may try to pick his pocket, or if he is generally wary, you must win a Quick Contest of Pickpocket vs. the higher of his Perception or Streetwise skill. To outwit a third party who is watching you and the victim, you must win a Quick Contest of Pickpocket vs. the watcher’s Observation skill.", "modifiers": "+5 if the victim is distracted; +10 if he is asleep or drunk; up to -5 for goods in an inner pocket; and up to -10 for a ring or similar jewelry.", "notes": ""}, "Poetry": {"default": -4, "grants": [], "description": "This is the ability to compose “good” poetry of any type native to your culture, in any language you know. A successful roll lets you write one good poem in an appropriate amount of time (GM’s decision). A failed roll might mean that you couldn’t get inspired – or that your audience just didn’t care for your work (for whatever reason).", "modifiers": "The time modifiers under Time Spent (p.346) will often apply; Cultural Familiarity modifiers (p.23); Language modifiers (p.23).", "notes": ""}, "Poisons": {"default": -5, "grants": [], "description": "This skill represents practical knowledge of poisons. A successful skill roll lets you (among other things) recognize a poison-bearing plant in the wild; extract the poison in a useful form; recognize a poison by its taste in food or drink; identify a poison by observing its effects (+3 if you are poisoned); know a proper antidote; or recognize or prepare the antidote from its sources. Each of these feats requires a separate roll.", "modifiers": "Acute Taste and Smell (p.35) gives a bonus to notice or rec- ognize a poison by taste or by scent. Likewise, Discriminatory Smell and Discriminatory Taste (p.49) give +4 to these tasks when working by smell or by taste, respectively.", "notes": ""}, "Politics": {"default": -4, "grants": ["Diplomacy", "Public Speaking"], "description": "This is the ability to get into office and get along with other politicians and bureaucrats. It has nothing to do with administration! You can only learn Politics in office or by working for someone in office. A successful skill roll will give you +2 on reactions from fellow politicians. The GM may opt to han- dle an election as a Quick Contest of Politics.", "modifiers": "+2 for Voice (p.97); -3 for Low Empathy (p.142); -1 to -4 for Shyness (p.154). In some jurisdictions, money is another important modifier.", "notes": ""}, "Propaganda": {"default": -4, "grants": [], "description": "This is the skill of indirect persuasion by proxy (spreading rumours through vassals, town criers, cermons, rituals, etc). It is used for psychological warfare by intelligence and military organizations, and for advertising and marketing in the civilian world. Use familiarity (p.169) to reflect the differences between these areas.\nPropaganda works on groups, not individuals. The GM should set the effective Will of the target group based on its size, composition, and resist- ance to the desired outcome, and then use the Influence Rolls (p.359) rules to determine the results. Success might inform the target audience or even alter its perceptions. Propaganda attempts nearly always take more time and exposure than ordinary Influence rolls, however; how much time is up to the GM.", "modifiers": "", "notes": ""}, "Prospecting": {"default": -4, "grants": ["Geology"], "description": "This is the skill of finding valuable minerals. A successful Prospecting roll lets you locate minerals, judge good ore from a small sample (and gauge its commercial value), and find water by using an “eye for country,” as described for Survival skill (p.223).\nThis skill is “applied geology,” and requires on-site examination. Prospecting from a distance – using maps, instrument readings, and extrapolation – uses Geology skill instead.", "modifiers": "Equipment modifiers (p.345); -1 in a new area of a familiar type, or -2 or more in an unfamiliar type of area, until you have been there for at least a month.", "notes": ""}, "Public Speaking": {"default": -4, "grants": ["Acting", "Panhandling", "Performance"], "description": "This is general talent with the spo- ken word. A successful skill roll lets you (for instance) give a good political speech, entertain a group around a campfire, incite or calm a riot, or put on a successful “court jester” act.\nPublic Speaking includes skill with debate, oratory, and rhetoric, as well as ability with less formal activities such as “punning” and storytelling. Not all speakers possess talent in all of these areas. You may take an optional specialty (p. 169) to represent this.", "modifiers": "+2 for Voice (p. 97); -1 to -4 for Shyness (p. 154); -2 for Stuttering (p. 157); Cultural Familiarity modi- fiers (p. 23); Language modifiers (p. 24).", "notes": ""}, "Research": {"default": -4, "grants": [], "description": "This is the ability to do library and file research. Roll against skill to find a useful piece of data in an appropriate place of research... if the information is there to be found.", "modifiers": "Language modifiers (p.24), for research materials in a foreign tongue.", "notes": ""}, "Riding": {"default": 0, "grants": ["Teamster"], "description": "This is the ability to ride a particular kind of mount. Make a skill roll when you first try to mount a riding animal, and again each time some- thing happens to frighten or challenge the creature (e.g., a jump).", "modifiers": "+5 if the animal knows and likes you; -10 if the animal has not been trained for riding.", "notes": "No specialty required only horses and mules exist."}, "Ritual (Eastern Christianity)": {"default": -6, "grants": ["Ritual (Western Christianity)", "Theology (Eastern Christianity)"], "description": "This is the ability to perform religious rites – masses, funerals, weddings, blessings, curses, exorcisms, etc. – before a congregation. You must specialise by religion. This skill includes detailed knowledge of the ritual motions, prayers, and trappings of the faith, as well as the ability to capture and hold the attention of worshipers. To be a priest or shaman, you must have both Ritual and Theology skill (p.226) for your religion.\nNote that this skills confers the ability to successfully identify, aid/observe, prepare and perform rituals. It does not offer any knowledge of the what rituals exists and why/how they work, those are the domain of the Theology skill.", "modifiers": "", "notes": "Renamed Religious Ritual (p.217). Includes Exorcism (p.193), Ritual Magic (p.218), and Symbol Drawing (p.224)."}, "Ritual (Graeco-Roman)": {"default": -6, "grants": ["Theology (Graeco-Roman)"], "description": "This is the ability to perform religious rites – masses, funerals, weddings, blessings, curses, exorcisms, etc. – before a congregation. You must specialise by religion. This skill includes detailed knowledge of the ritual motions, prayers, and trappings of the faith, as well as the ability to capture and hold the attention of worshipers. To be a priest or shaman, you must have both Ritual and Theology skill (p.226) for your religion.\nNote that this skills confers the ability to successfully identify, aid/observe, prepare and perform rituals. It does not offer any knowledge of the what rituals exists and why/how they work, those are the domain of the Theology skill.", "modifiers": "", "notes": "Renamed Religious Ritual (p.217). Includes Exorcism (p.193), Ritual Magic (p.218), and Symbol Drawing (p.224)."}, "Ritual (Gnosticism)": {"default": -6, "grants": ["Theology (Gnosticism)"], "description": "This is the ability to perform religious rites – masses, funerals, weddings, blessings, curses, exorcisms, etc. – before a congregation. You must specialise by religion. This skill includes detailed knowledge of the ritual motions, prayers, and trappings of the faith, as well as the ability to capture and hold the attention of worshipers. To be a priest or shaman, you must have both Ritual and Theology skill (p.226) for your religion.\nNote that this skills confers the ability to successfully identify, aid/observe, prepare and perform rituals. It does not offer any knowledge of the what rituals exists and why/how they work, those are the domain of the Theology skill.", "modifiers": "", "notes": "Renamed Religious Ritual (p.217). Includes Exorcism (p.193), Ritual Magic (p.218), and Symbol Drawing (p.224)."}, "Ritual (Slavic)": {"default": -6, "grants": ["Theology (Slavic)"], "description": "This is the ability to perform religious rites – masses, funerals, weddings, blessings, curses, exorcisms, etc. – before a congregation. You must specialise by religion. This skill includes detailed knowledge of the ritual motions, prayers, and trappings of the faith, as well as the ability to capture and hold the attention of worshipers. To be a priest or shaman, you must have both Ritual and Theology skill (p.226) for your religion.\nNote that this skills confers the ability to successfully identify, aid/observe, prepare and perform rituals. It does not offer any knowledge of the what rituals exists and why/how they work, those are the domain of the Theology skill.", "modifiers": "", "notes": "Renamed Religious Ritual (p.217). Includes Exorcism (p.193), Ritual Magic (p.218), and Symbol Drawing (p.224)."}, "Ritual (Tengrism)": {"default": -6, "grants": ["Theology (Tengrism)"], "description": "This is the ability to perform religious rites – masses, funerals, weddings, blessings, curses, exorcisms, etc. – before a congregation. You must specialise by religion. This skill includes detailed knowledge of the ritual motions, prayers, and trappings of the faith, as well as the ability to capture and hold the attention of worshipers. To be a priest or shaman, you must have both Ritual and Theology skill (p.226) for your religion.\nNote that this skills confers the ability to successfully identify, aid/observe, prepare and perform rituals. It does not offer any knowledge of the what rituals exists and why/how they work, those are the domain of the Theology skill.", "modifiers": "", "notes": "Renamed Religious Ritual (p.217). Includes Exorcism (p.193), Ritual Magic (p.218), and Symbol Drawing (p.224)."}, "Ritual (Western Christianity)": {"default": -6, "grants": ["Ritual (Eastern Christianity)", "Theology (Western Christianity)"], "description": "This is the ability to perform religious rites – masses, funerals, weddings, blessings, curses, exorcisms, etc. – before a congregation. You must specialise by religion. This skill includes detailed knowledge of the ritual motions, prayers, and trappings of the faith, as well as the ability to capture and hold the attention of worshipers. To be a priest or shaman, you must have both Ritual and Theology skill (p.226) for your religion.\nNote that this skills confers the ability to successfully identify, aid/observe, prepare and perform rituals. It does not offer any knowledge of the what rituals exists and why/how they work, those are the domain of the Theology skill.", "modifiers": "", "notes": "Renamed Religious Ritual (p.217). Includes Exorcism (p.193), Ritual Magic (p.218), and Symbol Drawing (p.224)."}, "Running": {"default": -3, "grants": [], "description": "This skill represents training in long-distance running. Roll against the higher of Running or HT to avoid fatigue or injury due to running. Note that you must have legs and be capable of land movement to learn this skill.", "modifiers": "", "notes": "Has been split into Sprinting below."}, "Savoir-Faire (Guilds)": {"default": -3, "grants": [], "description": "This is the skill of appropriate behaviour in a subculture that has an established code of conduct – for instance, high society or the military. When dealing with that social group, a successful skill roll lets you interact without embarrassing yourself, offending the group, detect outside pretenders, and so on. You may also substitute an Influence roll against Savoir-Faire for any reaction roll required in a social situation involving that subculture; see Influence Rolls (p.359). Roll once per encounter.\n", "modifiers": "Cultural Familiarity modifiers (p.23). +2 if you are of high- er standing than those you are trying to impress, or -2 if you are of lower standing (“standing” might mean Rank, Status, skill level, or something else). +2 if you seem to have important friends. -4 for Clueless (p. 126); -3 for Low Empathy (p.142); -1 for Oblivious (p.146); -1 to -4 for Shyness (p.154).", "notes": "Guilds (was Mafia): Proper conduct and formalities of trade guilds. This includes such things as codes of silence and showing proper deference to “made men.” These protocols often ape those of high society, but the penalties for misconduct are far more severe."}, "Savoir-Faire (Mercenaries)": {"default": -3, "grants": [], "description": "This is the skill of appropriate behaviour in a subculture that has an established code of conduct – for instance, high society or the military. When dealing with that social group, a successful skill roll lets you interact without embarrassing yourself, offending the group, detect outside pretenders, and so on. You may also substitute an Influence roll against Savoir-Faire for any reaction roll required in a social situation involving that subculture; see Influence Rolls (p.359). Roll once per encounter.\n", "modifiers": "Cultural Familiarity modifiers (p.23). +2 if you are of high- er standing than those you are trying to impress, or -2 if you are of lower standing (“standing” might mean Rank, Status, skill level, or something else). +2 if you seem to have important friends. -4 for Clueless (p. 126); -3 for Low Empathy (p.142); -1 for Oblivious (p.146); -1 to -4 for Shyness (p.154).", "notes": "Mercenaries (was Military): The customs, traditions, expectations and regulations of military service. This also includes knowledge of the unwritten rules such as what is acceptable even if not regulation, and what is forbidden although there is nothing in writing against it."}, "Savoir-Faire (Nobility)": {"default": -3, "grants": ["Heraldry"], "description": "This is the skill of appropriate behaviour in a subculture that has an established code of conduct – for instance, high society or the military. When dealing with that social group, a successful skill roll lets you interact without embarrassing yourself, offending the group, detect outside pretenders, and so on. You may also substitute an Influence roll against Savoir-Faire for any reaction roll required in a social situation involving that subculture; see Influence Rolls (p.359). Roll once per encounter.\n", "modifiers": "Cultural Familiarity modifiers (p.23). +2 if you are of high- er standing than those you are trying to impress, or -2 if you are of lower standing (“standing” might mean Rank, Status, skill level, or something else). +2 if you seem to have important friends. -4 for Clueless (p. 126); -3 for Low Empathy (p.142); -1 for Oblivious (p.146); -1 to -4 for Shyness (p.154).", "notes": "Nobility (was High Society): The manners of those of “good” birth and breeding. Status determines relative standing. Roll against skill whenever you must impersonate someone more than three Status levels away from your own. If your Status is negative and you are trying to pass yourself off as someone of Status 1+, or vice versa, this roll is at -2."}, "Savoir-Faire (Servants)": {"default": -3, "grants": [], "description": "This is the skill of appropriate behaviour in a subculture that has an established code of conduct – for instance, high society or the military. When dealing with that social group, a successful skill roll lets you interact without embarrassing yourself, offending the group, detect outside pretenders, and so on. You may also substitute an Influence roll against Savoir-Faire for any reaction roll required in a social situation involving that subculture; see Influence Rolls (p.359). Roll once per encounter.\n", "modifiers": "Cultural Familiarity modifiers (p.23). +2 if you are of high- er standing than those you are trying to impress, or -2 if you are of lower standing (“standing” might mean Rank, Status, skill level, or something else). +2 if you seem to have important friends. -4 for Clueless (p. 126); -3 for Low Empathy (p.142); -1 for Oblivious (p.146); -1 to -4 for Shyness (p.154).", "notes": "Servant (including both serfs and slaves): Knowledge of how to serve the upper class. Certain procedures are always done just so (the salad fork goes outside the dinner fork, the Duke is announced before the Earl, etc.), and certain attitudes in a servant are unacceptable. Note that this skills confers the knowledge, expectation and social awareness to serve a master, but has nothing to do with performing any task successfully."}, "Savoir-Faire (Town Watch)": {"default": -3, "grants": [], "description": "This is the skill of appropriate behaviour in a subculture that has an established code of conduct – for instance, high society or the military. When dealing with that social group, a successful skill roll lets you interact without embarrassing yourself, offending the group, detect outside pretenders, and so on. You may also substitute an Influence roll against Savoir-Faire for any reaction roll required in a social situation involving that subculture; see Influence Rolls (p.359). Roll once per encounter.\n", "modifiers": "Cultural Familiarity modifiers (p.23). +2 if you are of high- er standing than those you are trying to impress, or -2 if you are of lower standing (“standing” might mean Rank, Status, skill level, or something else). +2 if you seem to have important friends. -4 for Clueless (p. 126); -3 for Low Empathy (p.142); -1 for Oblivious (p.146); -1 to -4 for Shyness (p.154).", "notes": "Town Watch (was Police): As Savoir-Faire (Mercenaries), but for public serving warriors accountable to a formal authority exercising violence against civilians. This gives knowledge of the social protocols for town watchmen, prison guards, village champions, etc. It confers no knowledge of law and legal procedures, Law skill does."}, "Scrounging": {"default": -3, "grants": [], "description": "This is the ability to find, salvage, or improvise useful items that others can’t locate. Each attempt takes an hour. You do not necessarily steal your booty; you just locate it – somehow – and then acquire it by any means necessary. Note that if you find something that is “nailed down,” you must decide how to try to get it (which might require a roll on another skill).", "modifiers": "As the GM sees fit, for the rarity of the item sought.", "notes": ""}, "Search": {"default": -4, "grants": [], "description": "This is the ability to search people, baggage, and vehicles for items that aren’t in plain sight. The GM rolls once – in secret – per item of interest. For deliberately concealed items, this is a Quick Contest of your Search skill vs. the Holdout or Smuggling skill used to hide the item. If you fail, the GM simply says, “You found nothing.” (It defeats the purpose to say, “You don’t find the gun under his jacket.”)\nIf more than one person is searching, roll separately for each searcher.\nThe GM should avoid unnecessary rolls. For instance, no human can get a sawed-off shotgun through a body search. Likewise, a knife or jewel simply cannot be found on a normally dressed person without a strip search. In general, if the net bonus to the concealer’s Holdout roll is +3 or more, a skin search is required. If his Holdout is at -2 or worse for size, a skin search will automatically find the hidden item.", "modifiers": "+1 for a “pat-down” of an unresisting person (takes one minute), +3 for a thorough “skin search” of a person’s hair and clothing (takes three minutes), or +5 for a complete search, including body cavities (takes five minutes). Bonuses for Acute Touch (p.35) and Sensitive Touch (p.83) apply to all hands-on searches.", "notes": ""}, "Sewing": {"default": -3, "grants": [], "description": "This is the ability to work with fabric using the tools of your tech level. A successful skill roll lets you repair damaged clothing (or any other item made of cloth), modify garments (useful when you must wear another person’s clothing, per- haps to impersonate him), or create new clothing or costumes from suit- able materials.\nMake an IQ-based roll to design clothing, at +1 if you have Fashion Sense (p. 21).\nBefore TL7, someone knows this skill in almost every household. At TL7+, it is rare for anyone but a pro- fessional seamstress or tailor to know Sewing – most people work at default (at +4 for a simple task like reattach- ing a button) and discard items that they cannot mend.", "modifiers": "Equipment modifiers (p.345); modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138).", "notes": ""}, "Sex Appeal": {"default": -4, "grants": [], "description": "This is the ability to impress those who are attracted to members of your sex. It has as more to do with universally attractive characteristics reflected by one's Appearance and how to pronounce them in a socially acceptable manner, rather than how to take advantage of them in a private setting, which is the domain of the Erotic Art skill.\nYou may substitute an Influence roll against Sex Appeal for any reaction roll made by someone who is attracted to members of your sex; see Influence Rolls (p.359).\nUsually, you may make only one attempt per “target,” although the GM might allow another attempt after a few weeks.", "modifiers": "+2 for Voice (p.97); -3 for Low Empathy (p.142); -1 for Oblivious (p.146); -1 to -4 for Shyness (p.154); -2 for Stuttering (p.157).", "notes": ""}, "Shadowing": {"default": -4, "grants": ["Observation"], "description": "This is the ability to follow another person through a crowd without being noticed. (In the wilderness, use Tracking and Stealth). Roll a Quick Contest every 10 minutes:  your Shadowing vs. the subject’s Vision roll. If you lose, you lost the subject; if you lose by more than 5, you were seen.\nOnce the subject is aware you are shadowing him, roll a Quick Contest every five minutes:  your Shadowing skill vs. his Shadowing or Stealth skill. If he wins, he eludes you. If he loses by more than 5, he thinks he eluded you. If you critically fail, you lose him and follow the wrong person.", "modifiers": "-3 if the subject knows you. Distinctive appearance gives a penalty – see Build (p.18), Unnatural Features (p.22), and specific disadvantages (e.g., Hunchback, p.139) for details.", "notes": ""}, "Shiphandling": {"default": -5, "grants": [], "description": "This is the ability to act as the master of a large vessel. It involves directing the crew in the tasks necessary to control the vehicle’s speed and direction. It also covers such duties as keeping the captain’s log and inspecting the crew. Someone with Shiphandling skill (at better than default!) should stand watch at all times when the vessel is underway. Roll vs. skill when encountering hazards or manoeuvring for battle.\nA failed roll when encountering hazards means the vessel is damaged. This might mean anything from scratched paint to crippling damage that requires extensive repairs.\nA failed roll in battle means the vessel did not go exactly where intended. The details depend on the vessel, the tech level, and the GM’s judgment, but might include weapons being “masked” (unable to engage the enemy), a failed boarding attempt, or drifting out of formation with your fleet (which might deny you the benefits of area defences, fire support, or tactical communications).\nA critical failure under any circumstances means an appropriate disaster. Depending on the TL and situation, this could mean running aground, colliding with another vessel, being dismasted, losing your screws or rudder, or simply giving an order that your crew disregards. Whether they then save your ship for you, or mutiny and flee, is up to the GM.", "modifiers": "-2 for an unfamiliar crew; -2 or more for a vehicle in bad repair.", "notes": "No specialtiy required in TL3."}, "Siege (Chemical)": {"default": -5, "grants": ["Forward Observer"], "description": "This is the ability to use a heavy weapon, such as a bombard, crapaudeau or veuglaire, for indirect fire – that is, to put fire onto a target area via a high ballistic arc or similar path. Roll against the skill to bombard the target.\nLoaders can make ST-based skill rolls to improve the rate of fire of certain crew-served heavy weapons.\nNote that Forward Observer skill (p. 196) is generally required to designate targets for Artillery skill.", "modifiers": "All relevant combat modifiers; -2 for an unfamiliar fire-control system (e.g., map coordinates when you’re used to forward observers) or mount (e.g., a naval turret when you’re used to emplaced ground mounts), or for an unfamiliar weapon of a known type (e.g., crapaudeau versus veuglaire); -4 or more for a weapon in bad repair.", "notes": "Replaces Artillery (Cannons)."}, "Siege (Mechanical)": {"default": -4, "grants": ["Forward Observer"], "description": "This is the ability to use arbalests, springalds, ballistae and scorpions (even though the later are very rare in medieval Europe), usually mounted on a tripod or a vehicle, to make a direct-fire attack – that is, to aim and fire at a target to which you have a line of sight. Roll against the skill to hit the target.", "modifiers": "All applicable ranged combat modifiers; -2 for an unfamiliar aiming system, mount, or for an unfamiliar weapon of a known type (e.g., .30-cal when you are used to .50s); -4 or more for a weapon in bad repair.", "notes": "Replaces Artillery (Catapult) and Gunner (Catapult). Additional default to Crossbows"}, "Singing": {"default": -3, "grants": [], "description": "This is the ability to sing in a pleasing fashion. A successful roll means the audience liked your song.", "modifiers": "Language Modifiers (p.24), if you are singing in a foreign language; -2 if the audience does not understand the language; +2 for Voice (p.97); -2 for Stuttering (p.157).", "notes": ""}, "Sleight of Hand": {"default": -5, "grants": ["Filch", "Holdout", "Pickpocket"], "description": "This is the ability to “palm” small objects, do coin and card tricks, etc. Make a skill roll to perform one piece of simple “stage magic.” A failed roll means you blew the trick.\nWhen you use this skill to steal, you must win a Quick Contest of Sleight of Hand vs. the Vision roll or Observation skill of potential witness- es to perform the theft unnoticed.\nYou can also use this skill to cheat at cards, dice, etc. A successful Sleight of Hand roll gives from +1 to +5 on your Gambling roll. Any failure causes you to be denounced as a cheater! In both cases, the exact results are up to the GM.", "modifiers": "+3 if the light is dim; +3 if you have a confederate to distract attention; +5 if you have prepared in advance (cards up your sleeve, etc.); -3 if the person you want to fool knows Sleight of Hand himself; modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138).", "notes": ""}, "Smith (Copper)": {"default": -4, "grants": ["Alchemy", "Jeweler", "Smith (Iron)", "Smith (Lead & Tin)"], "description": "This is the ability to work by hand with copper itself and its alloys, including brass and bronze. This skill is IQ-based, but ST is important, and some tools have a “Minimum ST,” just like weapons.", "modifiers": "", "notes": ""}, "Smith (Iron)": {"default": -4, "grants": ["Alchemy", "Armoury (Armour)", "Smith (Copper)", "Armoury (Melee Weapons)", "Smith (Lead & Tin)"], "description": "This is the ability to work by hand iron and all its alloys, including steel. This skill is IQ-based, but ST is important, and some tools have a “Minimum ST,” just like weapons.", "modifiers": "", "notes": ""}, "Smith (Lead & Tin)": {"default": -4, "grants": ["Alchemy", "Jeweler", "Smith (Copper)", "Smith (Iron)"], "description": "This is the ability to work lead and tin by hand. This skill is IQ-based, but ST is important, and some tools have a “Minimum ST,” just like weapons.", "modifiers": "", "notes": ""}, "Smuggling": {"default": -4, "grants": [], "description": "This is the ability to conceal items in baggage and vehicles. You can also use it to hide an object in a room or a building. Roll against skill to hide an item from casual inspection. In an active search, the searchers must win a Quick Contest of Search vs. your Smuggling skill to find the item.", "modifiers": "Equipment modifiers (p.345) for specialized smuggling gear. The difference between the Size Modifier (p.19) of the package, vehi- cle, or room in which you are hiding the item and that of the item itself; e.g., to hide a bottle of liquor (SM-5) in a family car (SM+3), you would roll at +8.", "notes": ""}, "Speed-Reading": {"default": -4, "grants": [], "description": "This is the ability to read much faster than normal. Whenever time is of the essence (for instance, when reading the instructions on a para- chute as you fall), multiply your read- ing speed by a factor of 1 + (skill/10); e.g., Speed-Reading-12 would give a factor of 2.2. Make a skill roll to deter- mine whether you retain what you have read.\nOn a failure, your recall is shaky. Every time you try to remember or use what you read, you must make an IQ roll at a penalty equal to your margin of failure. Roll at +5 if you have Eidetic Memory, or +10 for Photographic Memory. If this roll fails, you cannot recall the informa- tion; on a critical failure, you recall badly flawed information but believe it to be true! To eliminate this IQ roll, you must go back and reread the material slowly.", "modifiers": "", "notes": ""}, "Sprinting": {"default": -3, "grants": [], "description": "This skill represents training in sprints (rapidly accelarating your speed). When racing someone, roll a Quick Contest of Running skill or ST to determine the winner modified by eithers' base move on foot to determine who wins.\nNote that you must have legs and be capable of land movement to learn this skill.", "modifiers": "", "notes": "Was included in Running (p.218)"}, "Stealth": {"default": -4, "grants": ["Shadowing"], "description": "This is the ability to hide and to move silently. A successful roll lets you conceal yourself anywhere except in a totally bare room, or move so quietly that nobody will hear you, or follow someone without being noticed. (To follow someone through a crowd, use Shadowing, p. 219.)\nIf someone is specifically on the alert for intruders, the GM will roll a Quick Contest between your Stealth and the sentinel’s Perception.\nYou can also use this skill to stalk game. A successful roll (and about 30 minutes) gets you within 30 yards of most animals. Another roll, at -5, gets you within 15 yards.", "modifiers": "A penalty equal to your encumbrance level. -5 to hide in an area without “natural” hiding places, or +3 or more if there are many hiding places. -5 to move silently if you are moving faster than Move 1. -5 to fool those with Discriminatory Smell (e.g., dogs).", "notes": ""}, "Strategy": {"default": -6, "grants": ["Intelligence Analysis", "Tactics"], "description": "This is the ability to plan military actions and predict the actions of the enemy. In most settings, only the military teaches this skill.\nA successful Strategy roll lets you deduce, in advance, enemy military plans unless another person with this skill leads them. In that case, the GM rolls a Quick Contest of Strategy. The amount of information gained depends on how well you roll (but not on the quality of the foe’s plans). If you fail an uncontested roll or lose a Quick Contest, the GM gives you false information.", "modifiers": "", "notes": "No specialty required."}, "Streetwise": {"default": -4, "grants": ["Forensics", "Savoir-Faire (Guilds)", "Savoir-Faire (Mercenaries)", "Savoir-Faire (Nobility)", "Savoir-Faire (Servants)", "Savoir-Faire (Town Watch)", "Search"], "description": "This is the skill of getting along in rough company. A successful Streetwise roll might let you learn (among other things) where any sort of illegal “action” is; which local cops or bureaucrats can be bought, and for how much; and how to contact the local underworld. Note that you might also be able to get this information by asking a Contact (p.44). This skill is a measure of your ability to make new connections as needed.\nYou may substitute an Influence roll against Streetwise for any reaction roll made in an underworld or “bad neighbourhood” situation; see Influence Rolls (p.359).\nFinally, a successful skill roll allows you to find and interpret clues, guess how criminals might behave, etc.", "modifiers": "+3 if you have a tough reputation (either “good” or “bad”) in the area; -3 if you are obviously a stranger in the area. -3 for Low Empathy (p. 142); -1 for Oblivious (p. 146); -1 to -4 for Shyness (p. 154).", "notes": "Includes Criminology (p.186)"}, "Surgery": {"default": -6, "grants": [], "description": "This is skill at using invasive med- ical techniques to treat sickness or injury. Roll once per operation. On a success, the operation proceeded without complications. On a failure, the patient took damage – 2d for a simple amputation, 3d for other pro- cedures. Surgery rolls can also facilitate recovery from wounds; see Surgery (p.424).\nThis skill represents general surgi- cal expertise, which is relatively rare in real life. Most surgeons have an option- al specialty (p. 169) in a certain part of the body (brain, heart, etc.) or a specif- ic type of surgery (cosmetic surgery, microsurgery, transplant surgery, etc.).", "modifiers": "Equipment modifiers (p.345); Physiology skill modifiers (p.181); -3 if the area or equipment cannot be properly cleaned and sterilized; -3 for head or chest surgery; -5 for undiag- nosed problems. If you lack Physician skill, you are at -5 to do anything but “field-expedient” surgery (e.g., stitch wounds or extract arrowheads, bul- lets, and shrapnel).", "notes": ""}, "Survival": {"default": -4, "grants": ["Camouflage"], "description": "This is the ability to “live off the land,” find safe food and water, avoid hazards, build shelter, etc. You may look after up to 10 other people. To live safely in a wilderness situation, you must make a successful Survival roll once per day. Failure inflicts 2d-4 injury on you and anyone in your care; roll separately for each victim.\nThis skill also gives an “eye for country.” A successful roll shows you the best direction of travel to find flowing water, a mountain pass, or whatever other terrain feature you desire – assuming that it exists.\nFinally, you can use this skill to trap wild animals. (A city-bred thief could use Traps skill, but he’s used to different game... so the roll would be at a -5). Make one roll per trap. It takes about 30 minutes to improvise a trap from ordinary materials, or 10 minutes to set and hide a commercial steel trap. Pit traps for large game take several hours to dig.\nSurvival often requires skill rolls based on scores other than Perception. The GM might ask for a ST-based roll to dig a pit trap or erect a log shelter, a DX-based roll to start a fire using primitive techniques (flint sparking, bow and palette, etc.), or even a HT- based roll to avoid nutritional deficiencies from an improvised diet.", "modifiers": "Up to -5 for extreme weather conditions. Equipment modifiers (p.345).", "notes": "No specialty, all the stories take place in the same climate."}, "Swimming": {"default": -3, "grants": [], "description": "This is the skill of swimming (whether on purpose or to keep afloat in emergencies) and lifesaving. Roll against the higher of Swimming or HT to avoid fatigue while swimming or injury due to aquatic misfortunes. When racing someone of equal water Move, roll a Quick Contest of Swimming to determine the winner. See Swimming (p.354).", "modifiers": "", "notes": ""}, "Tactics": {"default": -5, "grants": ["Strategy"], "description": "This is the ability to outguess and outmanoeuvre the enemy in small-unit or personal combat. In most settings, only the military teaches this skill.\nWhen commanding a small unit, roll against Tactics to place your troops correctly for an ambush, know where to post sentries, etc. At the GM’s option, a successful roll might even provide clues as to immediate enemy plans. To outmanoeuvre enemy units, you must win a Quick Contest of Tactics with their leader. All of this only applies when you lead a group small enough that you can give each warrior orders personally – or through at most one subordinate. Thus, radio and similar technologies can greatly enhance your command abilities!\nIn personal combat, you may make a Tactics roll before the fight begins if you had any time to prepare. On a success, you start the fight in an advantageous position – e.g., behind cover or on higher ground – as determined by the GM. The better the roll, the greater your advantage. If you fail, or do not attempt a Tactics roll, you are in a random location (or one of the GM’s choosing) when combat begins. Fighters without Tactics skill always\nstart combat this way.\nEven in an ambush or similar “surprise” situation, the GM will use the better of your Tactics skill and your Perception to see if you spotted the danger on time.", "modifiers": "", "notes": ""}, "Teaching": {"default": -4, "grants": [], "description": "This is the ability to instruct others. If you have Teaching at level 12+, you may act as a teacher for game purposes. For more on teaching and learning, see Improvement Through Study (p.292).", "modifiers": "-3 for Callous (p.125); -1 to -4 for Shyness (p.142). Apply both the teacher’s and the student’s Language penalties (p.24) in the language of instruction.", "notes": ""}, "Teamster": {"default": -4, "grants": [], "description": "This is the skill of driving a team of animals pulling a wagon, chariot, etc. It includes the ability to harness and care for the beasts, and judge them for quality before purchase. If the animals are ornery or badly trained (GM’s judgment), you must make a successful Animal Handling roll before you can attempt a Teamster roll.\nFor normal travel, make a Teamster roll once per day. When moving at a gallop (80% or more of the animals’ full Move) or when exe- cuting complex maneuvers with a chariot in combat, roll every 10 seconds.\nA failure usually means nothing worse than lost time or a wider turn than intended. A critical failure – or any failure at a gallop – spills the wagon or chariot. Treat this as a five- yard fall for each passenger and animal involved (see Falling, p.431). As well, roll 2d for each beast; on a 12, a leg is broken! You will have to make Animal Handling rolls to calm the beasts. Time required to reload the cargo depends on the load, terrain, and weather.", "modifiers": "-2 for more than four animals; -2 for a team of unfamiliar animals; up to -5 for bad terrain.", "notes": "No specialty required."}, "Theology (Eastern Christianity)": {"default": -6, "grants": ["Ritual (Eastern Christianity)", "Theology (Gnosticism)", "Theology (Western Christianity)"], "description": "This is the study of the patrirchical/eastern christian religion, in particular its gods, cosmology, doctrines, scriptures, etc. To be a priest or holy man, you must have both Theology and Ritual skill (p.217) for your religion.\nYou do not necessarily believe in the religion you study – faith comes from within, not from book learning! If you do, you may ask the GM to make a secret roll against your Theology skill when confronted with moral uncertainty. On a success, the GM will advise you on which course of action “feels” right, given your beliefs and understanding of scripture.\nThis skill also offers knowledge of your specialties rituals, the steps to perform them as well as how and why they work; but no it does not convey any skill of performing them, that is the domain of the Ritual skill.", "modifiers": "", "notes": "Renamed Hidden Lore (p.199), Occultism (p.212), Religious Ritual (p.217). Includes Thaumatology (p.225)."}, "Theology (Graeco-Roman)": {"default": -6, "grants": ["Ritual (Graeco-Roman)"], "description": "This is the study of the classical religions of ancient Greeks and Romans, as well as the later syncretic Greco-Roman practices and their mystery cults), in particular its gods, cosmology, doctrines, scriptures, etc. To be a priest or holy man, you must have both Theology and Ritual skill (p.217) for your religion.\nYou do not necessarily believe in the religion you study – faith comes from within, not from book learning! If you do, you may ask the GM to make a secret roll against your Theology skill when confronted with moral uncertainty. On a success, the GM will advise you on which course of action “feels” right, given your beliefs and understanding of scripture.\nThis skill also offers knowledge of your specialties rituals, the steps to perform them as well as how and why they work; but no it does not convey any skill of performing them, that is the domain of the Ritual skill.", "modifiers": "", "notes": "Renamed Hidden Lore (p.199), Occultism (p.212), Religious Ritual (p.217). Includes Thaumatology (p.225)."}, "Theology (Gnosticism)": {"default": -6, "grants": ["Ritual (Gnosticism)", "Theology (Eastern Christianity)", "Theology (Western Christianity)"], "description": "This is the study of the extant Bogomil and Cathar hersesies as well as their Valentinian and Paulician roots and Dacian/Zalmoxis and Persian/Ahuramazda influences), in particular its gods, cosmology, doctrines, scriptures, etc. To be a priest or holy man, you must have both Theology and Ritual skill (p.217) for your religion.\nYou do not necessarily believe in the religion you study – faith comes from within, not from book learning! If you do, you may ask the GM to make a secret roll against your Theology skill when confronted with moral uncertainty. On a success, the GM will advise you on which course of action “feels” right, given your beliefs and understanding of scripture.\nThis skill also offers knowledge of your specialties rituals, the steps to perform them as well as how and why they work; but no it does not convey any skill of performing them, that is the domain of the Ritual skill.", "modifiers": "", "notes": "Renamed Hidden Lore (p.199), Occultism (p.212), Religious Ritual (p.217). Includes Thaumatology (p.225)."}, "Theology (Slavic)": {"default": -6, "grants": ["Ritual (Slavic)"], "description": "This is the study of the pagan beliefs of the Slavic peoples, in particular its gods, cosmology, doctrines, scriptures, etc. To be a priest or holy man, you must have both Theology and Ritual skill (p.217) for your religion.\nYou do not necessarily believe in the religion you study – faith comes from within, not from book learning! If you do, you may ask the GM to make a secret roll against your Theology skill when confronted with moral uncertainty. On a success, the GM will advise you on which course of action “feels” right, given your beliefs and understanding of scripture.\nThis skill also offers knowledge of your specialties rituals, the steps to perform them as well as how and why they work; but no it does not convey any skill of performing them, that is the domain of the Ritual skill.", "modifiers": "", "notes": "Renamed Hidden Lore (p.199), Occultism (p.212), Religious Ritual (p.217). Includes Thaumatology (p.225)."}, "Theology (Tengrism)": {"default": -6, "grants": ["Ritual (Tengrism)"], "description": "This is the study of the shamanic beliefs of the steppe peoples, in particular its gods, cosmology, doctrines, scriptures, etc. To be a priest or holy man, you must have both Theology and Ritual skill (p.217) for your religion.\nYou do not necessarily believe in the religion you study – faith comes from within, not from book learning! If you do, you may ask the GM to make a secret roll against your Theology skill when confronted with moral uncertainty. On a success, the GM will advise you on which course of action “feels” right, given your beliefs and understanding of scripture.\nThis skill also offers knowledge of your specialties rituals, the steps to perform them as well as how and why they work; but no it does not convey any skill of performing them, that is the domain of the Ritual skill.", "modifiers": "", "notes": "Renamed Hidden Lore (p.199), Occultism (p.212), Religious Ritual (p.217). Includes Thaumatology (p.225)."}, "Theology (Western Christianity)": {"default": -6, "grants": ["Ritual (Western Christianity)", "Theology (Gnosticism)", "Theology (Eastern Christianity)"], "description": "This is the study of the papal/western christian religion, in particular its gods, cosmology, doctrines, scriptures, etc. To be a priest or holy man, you must have both Theology and Ritual skill (p.217) for your religion.\nYou do not necessarily believe in the religion you study – faith comes from within, not from book learning! If you do, you may ask the GM to make a secret roll against your Theology skill when confronted with moral uncertainty. On a success, the GM will advise you on which course of action “feels” right, given your beliefs and understanding of scripture.\nThis skill also offers knowledge of your specialties rituals, the steps to perform them as well as how and why they work; but no it does not convey any skill of performing them, that is the domain of the Ritual skill.", "modifiers": "", "notes": "Renamed Hidden Lore (p.199), Occultism (p.212), Religious Ritual (p.217). Includes Thaumatology (p.225)."}, "Torture": {"default": -4, "grants": [], "description": "This is the ability to use and improvise torture devices and practices to inflict pain and humiliation to a victim. Additionally, you can control the damage each intrument would normally inflict to prolong the torture. The victims must either willingly submit or violently subdued to exercise this skill.", "modifiers": "", "notes": "Also makes you proficient with sap, flogger, and whips. Replacing the Melee Weapon (Whip) specialty."}, "Tracking": {"default": -4, "grants": [], "description": "This is the ability to follow a man or an animal by their tracks. Make a Tracking roll to pick up the trail, then roll periodically to avoid losing it. The frequency and difficulty of these rolls depend on the terrain: \nJungle, Plains, or Woodlands:  Roll every 30 minutes.\nArctic, Desert, Island/Beach, or Mountain:  Roll at -2 every 15 minutes.\nSwampland:  Roll at -4 every 5 minutes.\nUrban:  Roll at -6 every minute!\nYou may also use this skill to cover your tracks. This doubles your travel time! A successful roll means you have hidden your tracks well enough that only someone else with this skill can see them. If another tracker follows you, the Tracking rolls above become Quick Contests of Tracking skill. If he loses any of the Contests, he loses your trail.\nTo stalk game once you have tracked it, use the Stealth skill (p. 222).", "modifiers": "-5 if the trail is more than a day old, or -10 if more than a week old. +3 if you are following a man, or +6 if following a group of men. Superior senses help a lot:  bonuses for Acute Vision (p.35) and Discriminatory Smell (p.49) usually apply, and many superhuman senses (Infravision, Subsonic Hearing, etc.) give situational bonuses.", "notes": ""}, "Traps": {"default": -4, "grants": [], "description": "This is the skill of building and disarming traps. A successful Traps roll will (among other things) disarm a trap once you have found it, reset it after you pass, or build a new trap (given suitable materials). Time required is as for Lockpicking (p.206). To detect a trap, make a Perception-based skill roll.\nNote that for the purposes of Traps skill, detection devices are “traps.” Thus, this skill covers everything from covered pits to elaborate electronic security systems!", "modifiers": "Infinitely variable. The more sophisticated the trap, the hard- er it will be to disarm, reset, build, or find – and a given trap might be (for instance) easy to find but hard to dis- arm. The GM should be creative! Equipment modifiers (p.345) apply to most rolls to set or disarm traps. Bonuses for Acute Vision (p.35) apply to rolls to detect traps (only).", "notes": ""}, "Urban Survival": {"default": -4, "grants": [], "description": "This talent covers the physical part of staying alive in a city environment, whether it’s overpopulated or empty, in contrast to the social problems of city survival are covered by Streetwise skill. A successful skill roll allows you to find clean rainwater, locate manholes from above or below, quickly navigate buildings (locating entrances, exits, stairwells, etc.), recognize and avoid physically dangerous areas (such as crumbling buildings), mentally make and recall city maps, find your way out of strange city areas, find a warm place to sleep outside in cold weather, and locate common types of buildings or businesses without asking anyone, just by your “feel” for the way cities are laid out.", "modifiers": "", "notes": ""}, "Ventriloquism": {"default": -5, "grants": [], "description": "This is the ability to disguise and “throw” your voice a short distance. A successful roll lets you throw your voice well enough to fool your audience.", "modifiers": "+5 if you have a dummy or confederate to distract your audience (it’s easier to “see” a face talk than it is to believe the voice comes from an immobile object); -3 if the audience has reason to be suspicious.", "notes": ""}, "Weapon (Axes-Hammers-Picks)": {"default": -4, "grants": ["Weapon (Sickles-Scythes)", "Weapon (Clubs-Maces)", "Weapon (Flails)", "Weapon (Polearms)"], "description": "This group of weapons include any rigid, unbalanced weapon with most of its mass concentrated in a protruding head, like a blade, hammer, or spike. Such a weapon cannot parry if you have already attacked with it on your turn.", "modifiers": "", "notes": "Replaces a Melee Weapon (Axe/Mace, Two-Handed Axe/Mace) specialty. Split into this and Club-Mace skill."}, "Weapon (Clubs-Maces)": {"default": -4, "grants": ["Weapon (Sickles-Scythes)", "Weapon (Axes-Hammers-Picks)", "Weapon (Flails)"], "description": "This group of weapons include any rigid, unbalanced weapon with most of its mass concentrated in the blunt head.", "modifiers": "", "notes": "Replaces a Melee Weapon (Axe/Mace, Two-Handed Axe/Mace) specialty. Split into this and Axe-Hammer-Pick skill."}, "Weapon (Flails)": {"default": -5, "grants": ["Weapon (Sickles-Scythes)", "Weapon (Axes-Hammers-Picks)", "Weapon (Clubs-Maces)"], "description": "A flail is any flexible, unbalanced weapon with its mass concentrated in the head. Such a weapon cannot parry if you have already attacked with it on your turn. Because flails tend to wrap around the target’s shield or weapon, attempts to block them are at -2 and attempts to parry them are at -4. Fencing weapons and knives cannot parry them at all! An unarmed fighter can parry a flail, but at -4 in addition to any penalty for parrying unarmed.", "modifiers": "", "notes": "Replaces a Melee Weapon (Flail, Two-Handed Flail) specialty."}, "Weapon (Sickles-Scythes)": {"default": -5, "grants": ["Weapon (Axes-Hammers-Picks)", "Weapon (Clubs-Maces)", "Weapon (Flails)", "Weapon (Polearms)"], "description": "A flail is any flexible, unbalanced weapon with its mass concentrated in the head. Such a weapon cannot parry if you have already attacked with it on your turn. Because flails tend to wrap around the target’s shield or weapon, attempts to block them are at -2 and attempts to parry them are at -4. Fencing weapons and knives cannot parry them at all! An unarmed fighter can parry a flail, but at -4 in addition to any penalty for parrying unarmed.", "modifiers": "", "notes": "Replaces a Melee Weapon (Flail, Two-Handed Flail) specialty."}, "Weapon (Javelins)": {"default": -4, "grants": ["Weapon (Pikes)"], "description": "Any thrown long, balanced pole weapon with a thrusting point, including javelins, and pilums.", "modifiers": "", "notes": "Replaces Thrown Weapon (Spear) (p.226)."}, "Weapon (Pikes)": {"default": -4, "grants": ["Weapon (Javelins)", "Weapon (Polearms)"], "description": "Any melee (one and two handed) long, balanced pole weapon with a thrusting point, including spears, tridents, and fixed bayonets.", "modifiers": "", "notes": "Replaces a Melee Weapon (Spear) specialty."}, "Weapon (Polearms)": {"default": -4, "grants": ["Weapon (Axes-Hammers-Picks)", "Weapon (Sickles-Scythes)", "Weapon (Curved Swords)", "Weapon (Pikes)", "Weapon (Staves)"], "description": "Any very long (at least 2 yards), unbalanced pole weapon with a heavy striking head, including the glaive, halberd, poleaxe, and countless others. Polearms become unready after an attack, but not after a parry.", "modifiers": "", "notes": "Replaces a Melee Weapon (Polearm) specialty."}, "Weapon (Staves)": {"default": -3, "grants": ["Weapon (Pikes)", "Weapon (Staves)"], "description": "Any long, balanced pole without a striking head. This skill makes good use of the staff’s extensive parrying surface when defending, giving +2 to your Parry score.", "modifiers": "", "notes": "Replaces a Melee Weapon (Staff) specialty."}, "Weapon (Small Swords)": {"default": -3, "grants": ["Weapon (Fencing Swords)", "Weapon (Curved Swords)", "Weapon (Long Swords)"], "description": "Daggers and short swords", "modifiers": "", "notes": "Replaces a Melee Weapon (Knife) specialty. Includes Thrown Weapon (Knife) (p.226)."}, "Weapon (Fencing Swords)": {"default": -4, "grants": ["Weapon (Small Swords)", "Weapon (Curved Swords)", "Weapon (Long Swords)"], "description": "Main-gauche/stilettos, estoc/rapiers, hunting/skinning knives, cutlasses and sabres.", "modifiers": "", "notes": "Replaces a Melee Weapon (Shortsword) specialty."}, "Weapon (Curved Swords)": {"default": -4, "grants": ["Weapon (Small Swords)", "Weapon (Fencing Swords)", "Weapon (Long Swords)"], "description": "Machettes, falchion/scimitars, hunting/skinning knives, cutlasses and sabres.", "modifiers": "", "notes": "Replaces a Melee Weapon (Broadsword) specialty."}, "Weapon (Long Swords)": {"default": -4, "grants": ["Weapon (Small Swords)", "Weapon (Fencing Swords)", "Weapon (Curved Swords)"], "description": "Bastard and great swords.", "modifiers": "", "notes": "Replaces a Melee Weapon (Two-Handed Sword) specialty."}, "Weapon (Shields)": {"default": -3, "grants": [], "description": "This is the ability to use a shield, in order to cover from incoming missiles, block attacks and to attack with it. Your active defence with any kind of shield – your Block score – is (skill/2) + 3,\nrounded down.\nIt includes any shield held in place with straps. Such shields have the advantage that you can hold (but not wield) something in your shield hand, but the disadvantage of being slow to put on or take off.", "modifiers": "", "notes": "No specialty required in TL3 and below."}, "Weapon (Cloaks)": {"default": -4, "grants": ["Weapon (Nets)"], "description": "This is the skill of using a cloak or a cape as a weapon. It covers the use of two types of cloak:  the waist-length “light cloak” (any cloak, cape, or coat weighing less than 5 lbs.) and the full length “heavy cloak” (any cloak weigh- ing 5 lbs. or more).\nOffensively, you can use a cloak to entangle an opponent – see Special Melee Weapon Rules (p. 404) for details. You can also snap a cloak in your opponent’s face or simply use it to block his vision, either of which counts as a Feint maneuver.\nDefensively, a cloak works much like a shield. It provides a Defense Bonus (+1 if light, +2 if heavy) and gives a Block defense equal to (skill/2) + 3, rounded down. A cloak is not as robust as a shield, though! A light cloak has only DR 1 and 3 HP, while a heavy cloak has DR 1 and 5 HP.", "modifiers": "", "notes": ""}, "Weapon (Nets)": {"default": -5, "grants": ["Weapon (Cloaks)"], "description": "This is the ability to use a net as a thrown or melee weapon. For detailed net rules, see Special Ranged Weapons (p.410).", "modifiers": "", "notes": ""}, "Weapon (Bows)": {"default": -4, "grants": [], "description": "This is the ability to use the longbow, short bow, and all similar bows. It also covers the compound bow, although a person who had never seen a compound bow would suffer a -2 unfamiliarity penalty.", "modifiers": "", "notes": ""}, "Weapon (Crossbows)": {"default": -3, "grants": [], "description": "This is the ability to use all types of crossbows, including the pistol crossbow, prodd (which fires pellets or stones), repeating crossbow, and high-tech compound crossbow.", "modifiers": "", "notes": "Additional default to Bolt Throwers"}, "Weapon (Handgonnes)": {"default": -3, "grants": [], "description": "This is the ability to use a hand-held handgonne or arquebus. Roll against the skill to hit your target. Make an IQ-based skill roll to take immediate action (e.g., eject a dud round), should your weapon fail.", "modifiers": "All applicable ranged combat modifiers; -2 for an unfamiliar action, grip, or for an unfamiliar weapon of a known type (e.g., a 5.56mm rifle when you are used to a 7.62mm rifle); -4 or more for a weapon in bad repair.", "notes": "Replaces Guns (gonne). Additional default to Cannons"}, "Writing": {"default": -4, "grants": ["Poetry", "Research"], "description": "This is the ability to write in a clear or entertaining manner. A successful roll means the work is readable and accurate. This is mostly useful to earn a living, but can sometimes help on adventures... or after them. The report of a spy, soldier, or private investigator is far more useful if it is well-written!", "modifiers": "The time modifiers under Time Spent (p.346) will often apply; -5 if you are writing about an unfamiliar subject; Language modifiers (p.24).", "notes": ""}};

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function fmtVal(v, derived) {
  const cls = derived ? 'derived' : (v > 0 ? '' : v < 0 ? 'neg' : 'zero');
  const str = v > 0 ? '+' + v : v === 0 ? '±0' : String(v);
  return `<span class="skill-val ${cls}">${str}</span>`;
}

function attrFmt(v) {
  const cls = v > 0 ? '' : v < 0 ? 'neg' : 'zero';
  const str = v > 0 ? '+' + v : v === 0 ? '±0' : String(v);
  return `<span class="attr-val ${cls}">${str}</span>`;
}

function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

let skillDetailOpen = {};

function toggleSkillDetail(uid) {
  const detail = document.getElementById('sd-' + uid);
  const btn = document.getElementById('stb-' + uid);
  if (!detail) return;
  const isOpen = detail.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.textContent = isOpen ? '−' : '+';
}

// ─── BUILD SKILLS ─────────────────────────────────────────────────────────────

function buildSkills(charSkills) {
  // charSkills: { skillName: value, ... }
  // For each skill, look up SKILLS_DB for grants and add derived skills
  const allSkills = {};

  // Add primary skills
  for (const [name, val] of Object.entries(charSkills)) {
    allSkills[name] = { value: val, derived: false };
  }

  // Add derived skills from grants
  for (const [name, val] of Object.entries(charSkills)) {
    const entry = SKILLS_DB[name];
    if (!entry) continue;
    for (const grantedSkill of (entry.grants || [])) {
      if (allSkills[grantedSkill]) continue; // already have it
      const derivedEntry = SKILLS_DB[grantedSkill];
      const defaultOffset = derivedEntry ? derivedEntry.default : -4;
      const derivedVal = val + defaultOffset;
      allSkills[grantedSkill] = { value: derivedVal, derived: true };
    }
  }

  // Sort alphabetically
  const sorted = Object.keys(allSkills).sort((a, b) => a.localeCompare(b));

  const grid = document.getElementById('skills-grid');
  grid.innerHTML = '';

  sorted.forEach((name, i) => {
    const { value, derived } = allSkills[name];
    const uid = 'skill_' + i;
    const dbEntry = SKILLS_DB[name];

    const hasDetail = dbEntry && (dbEntry.description || dbEntry.modifiers || dbEntry.notes);

    const row = document.createElement('div');
    row.className = 'skill-row';

    const nameCls = derived ? 'skill-name derived' : 'skill-name';
    const valHtml = fmtVal(value, derived);

    let detailHtml = '';
    if (hasDetail) {
      const parts = [];
      if (dbEntry.description) {
        parts.push(`<div class="skill-detail-section"><div class="skill-detail-label">Description</div>${escHtml(dbEntry.description)}</div>`);
      }
      if (dbEntry.modifiers) {
        parts.push(`<div class="skill-detail-section"><div class="skill-detail-label">Modifiers</div>${escHtml(dbEntry.modifiers)}</div>`);
      }
      if (dbEntry.notes) {
        parts.push(`<div class="skill-detail-section"><div class="skill-detail-label">Notes</div>${escHtml(dbEntry.notes)}</div>`);
      }
      detailHtml = `<div class="skill-detail" id="sd-${uid}">${parts.join('')}</div>`;
    }

    const toggleBtn = hasDetail
      ? `<button class="skill-toggle" id="stb-${uid}" onclick="toggleSkillDetail('${uid}')" title="Show details">+</button>`
      : `<span style="width:22px;flex-shrink:0;"></span>`;

    row.innerHTML = `
      <div class="skill-main">
        ${valHtml}
        <span class="${nameCls}">${escHtml(name)}</span>
        ${toggleBtn}
      </div>
      ${detailHtml}
    `;

    grid.appendChild(row);
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── BUILD ABILITIES ──────────────────────────────────────────────────────────

function buildAbilities(abilities) {
  const body = document.getElementById('abilities-body');
  body.innerHTML = '';
  const cats = ['Awareness', 'Faith', 'Heritage', 'Nobility'];
  let anyShown = false;

  for (const cat of cats) {
    const catData = abilities[cat];
    if (!catData || catData.level === 0 || Object.keys(catData.abilities).length === 0) continue;
    anyShown = true;

    const div = document.createElement('div');
    div.className = 'abilities-cat';

    const level = catData.level;
    div.innerHTML = `<div class="abilities-cat-header"><span class="ability-level">+${level}</span><span>${cat}</span></div>`;

    for (const [abName, abDesc] of Object.entries(catData.abilities)) {
      const item = document.createElement('div');
      item.className = 'ability-item';
      item.innerHTML = `<span class="ability-name">${escHtml(abName)}:</span> <span class="ability-desc">${escHtml(abDesc)}</span>`;
      div.appendChild(item);
    }

    body.appendChild(div);
  }

  if (!anyShown) {
    body.innerHTML = '<span class="empty-msg">No abilities.</span>';
  }
}

// ─── BUILD TRAITS ─────────────────────────────────────────────────────────────

function buildTraits(traits) {
  const body = document.getElementById('traits-body');
  body.innerHTML = '';

  if (!traits || Object.keys(traits).length === 0) {
    body.innerHTML = '<span class="empty-msg">No traits.</span>';
    return;
  }

  for (const [tName, tDesc] of Object.entries(traits)) {
    const item = document.createElement('div');
    item.className = 'trait-item';
    item.innerHTML = `<span class="trait-name">${escHtml(tName)}:</span><br><span class="trait-desc">${escHtml(tDesc)}</span>`;
    body.appendChild(item);
  }
}

// ─── RENDER CHARACTER ─────────────────────────────────────────────────────────

function renderChar(data) {
  // Name
  document.getElementById('char-name').textContent = data.name;
  document.title = data.name + ' — Character Sheet';

  // Attributes — fixed display order, 2 cols × 3 rows
  const attrOrder = ['Agility', 'Charisma', 'Health', 'Perception', 'Strength', 'Reason'];
  const grid = document.getElementById('attrs-grid');
  grid.innerHTML = '';
  for (const key of attrOrder) {
    const v = data.attributes[key] !== undefined ? data.attributes[key] : 0;
    const item = document.createElement('div');
    item.className = 'attr-item';
    item.innerHTML = `${attrFmt(v)} <span class="attr-name">${escHtml(key)}</span>`;
    grid.appendChild(item);
  }

  // Skills
  buildSkills(data.skills);

  // Abilities
  buildAbilities(data.abilities);

  // Traits
  buildTraits(data.traits);

  // Gear
  const gearList = document.getElementById('gear-list');
  gearList.innerHTML = '';
  if (!data.gear || data.gear.length === 0) {
    gearList.innerHTML = '<span class="empty-msg">No gear.</span>';
  } else {
    for (const item of data.gear) {
      const li = document.createElement('li');
      li.className = 'gear-item';
      li.innerHTML = item;
      gearList.appendChild(li);
    }
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────────────────

const CHARS = {
  ion: ION_DATA,
  miklos: MIKLOS_DATA,
  casimir: CASIMIR_DATA,
  leonardo: LEONARDO_DATA,
  pavo: PAVO_DATA

const sel = document.getElementById('char-select');
sel.addEventListener('change', () => renderChar(CHARS[sel.value]));

renderChar(CHARS['ion']);
</script>
