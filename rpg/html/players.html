n not understand each other at all.\nFinally, almost all language have regional dialects imposing a -1 penalty.", "modifiers": "", "notes": ""}, "Language (Illyrian)": {"default": -6, "grants": ["Language (Albanian)", "Literacy (Greek)"], "description": "The ability to express oneself verbally and comprehend others audiably in a particular language. The default applies only to one's native language. Both participants roll once each time they converse summing their scores.\nSuccess implies that they can understand eachother at a native level; -1 represent accented comprehension, missing some finer details of the context of the conversation; -2 is broken communication only some verbs and nouns can be understood by each party; -3 and means below means that the participant can not understand each other at all.\nFinally, almost all language have regional dialects imposing a -1 penalty.", "modifiers": "", "notes": ""}, "Language (Arabic)": {"default": -6, "grants": ["Literacy (Arabic)"], "description": "The ability to express oneself verbally and comprehend others audiably in a particular language. The default applies only to one's native language. Both participants roll once each time they converse summing their scores.\nSuccess implies that they can understand eachother at a native level; -1 represent accented comprehension, missing some finer details of the context of the conversation; -2 is broken communication only some verbs and nouns can be understood by each party; -3 and means below means that the participant can not understand each other at all.\nFinally, almost all language have regional dialects imposing a -1 penalty.", "modifiers": "", "notes": ""}, "Language (Hebrew)": {"default": -6, "grants": ["Literacy (Hebrew)"], "description": "The ability to express oneself verbally and comprehend others audiably in a particular language. The default applies only to one's native language. Both participants roll once each time they converse summing their scores.\nSuccess implies that they can understand eachother at a native level; -1 represent accented comprehension, missing some finer details of the context of the conversation; -2 is broken communication only some verbs and nouns can be understood by each party; -3 and means below means that the participant can not understand each other at all.\nFinally, almost all language have regional dialects imposing a -1 penalty.", "modifiers": "", "notes": ""}, "Language (Albanian)": {"default": -6, "grants": ["Language (Greek/East/Doric)", "Language (Illyrian)", "Literacy (Greek)"], "description": "The ability to express oneself verbally and comprehend others audiably in a particular language. The default applies only to one's native language. Both participants roll once each time they converse summing their scores.\nSuccess implies that they can understand eachother at a native level; -1 represent accented comprehension, missing some finer details of the context of the conversation; -2 is broken communication only some verbs and nouns can be understood by each party; -3 and means below means that the participant can not understand each other at all.\nFinally, almost all language have regional dialects imposing a -1 penalty.", "modifiers": "", "notes": ""}, "Language (Bulgarian)": {"default": -6, "grants": ["Language (Slavic/South/Slavonic)", "Language (Turkic/Kipchak/Cuman)", "Language (Turkic/Kipchak/Pecheneg)", "Literacy (Cyrillic)"], "description": "The ability to express oneself verbally and comprehend others audiably in a particular language. The default applies only to one's native language. Both participants roll once each time they converse summing their scores.\nSuccess implies that they can understand eachother at a native level; -1 represent accented comprehension, missing some finer details of the context of the conversation; -2 is broken communication only some verbs and nouns can be understood by each party; -3 and means below means that the participant can not understand each other at all.\nFinally, almost all language have regional dialects imposing a -1 penalty.", "modifiers": "", "notes": ""}, "Law": {"default": -5, "grants": [], "description": "This skill represents knowledge of Corpus Juris Civilis. A successful roll lets you remember, deduce, twist, or figure out the answer to a question about the law. Few legal questions have clear-cut answers, however – even an expert will hedge his advice!\nCustomary law is included in cultural familiarity, while religious law is part of Theology. Therefore this skill applies only in the jurisdiction of a feudal court.\nIn some times and places, a Quick Contest of Law between the defence and prosecution will determine the outcome of a trial. In others, Law functions as an Influence skill (see Influence Rolls, p.359) used to sway the rulings of the judge.\nLaw enforcers rarely have any points in Law. They rely on their liege's orders and cultural familiarity to identify crimes.", "modifiers": "", "notes": "No specialty required."}, "Leadership": {"default": -4, "grants": [], "description": "This is the ability to coordinate a group. Make a Leadership roll to lead NPCs into a dangerous or stressful situation. (PCs can decide for themselves if they want to follow you!)\nYou may attempt a Leadership roll in combat if you spend your turn doing nothing but giving orders and encouragement. On a success, everyone on your side who can hear you (including PCs) has +1 on all combat-related Fright Checks and morale checks, and on self-control rolls for disadvantages that would reduce combat efficiency (such as Berserk and Cowardice – or Bloodlust, if you wish to take prisoners). A critical success gives +2. The bonus lasts until your next turn, at which time you may roll again. A group can have only one leader, however! If multiple people attempt Leadership rolls, no one gets a bonus.\nNote that a minimum level of Leadership is often a prerequisite for high Rank (p.29).", "modifiers": "-3 for Low Empathy (p.142); -1 to -4 for Shyness (p.154). -5 if the NPCs have never been in action with you; -5 if you are sending them into danger but not going yourself; +5 if their loyalty to you is “Good”; +10 if their loyalty is “Very Good.” If their loyalty is “Excellent,” you do not have to roll!", "notes": ""}, "Leatherworking": {"default": -3, "grants": [], "description": "This is the ability to work with leather to make belts, saddles, armor, etc. A successful skill roll lets you repair or create leather goods. Make an IQ-based roll to design items that are more artistic than functional.", "modifiers": "Equipment modifiers (p.345); +1 per level of High Manual Dexterity (p.59), or -3 per level of Ham-Fisted (p.138).", "notes": ""}, "Lifting": {"default": -3, "grants": [], "description": "This is the trained ability to use your strength to its best advantage when you lift. Roll once per lift. On a success, increase your Basic Lift by 5% per point by which you made your roll. This has no effect on encum- brance, or on how much you can carry. See Lifting and Moving Things (p.353).", "modifiers": "", "notes": ""}, "Linguistics": {"default": -5, "grants": [], "description": "This is the study of the principles upon which languages are based. A successful skill roll lets you identify a language from a snatch of speech or writing. As well, make a skill roll once per month when learning a language without a teacher. On a success, you learn at full speed rather than at 1/4 speed (see Learning Languages, p.25).", "modifiers": "", "notes": ""}, "Lip Reading": {"default": 0, "grants": [], "description": "This is the ability to see what others are saying. You must be within seven yards, or have some means of bringing your point of view this close. A successful skill roll lets you make out one sentence of a discussion – assuming, of course, that you know the language. If your subjects suspect that you can read lips, they can hide their mouths or subvocalize to thwart you. A critical failure on a Lip Reading roll – if you are where your victims could see you – means that you stared so much you were noticed!", "modifiers": "All Vision modifiers (see Vision, p. 358).", "notes": ""}, "Literacy (Arabic)": {"default": -5, "grants": [], "description": "This is the ability to read and write in a language you know, see Language skill (p.23). When writiing a document you roll this skill and the result is the modifier for anyone else who uses this skill to comprehend your writting. Success means that you understand everything written, while critical success offers a deep insight by the handwriting, mannerism, choice of words, etc. Failure conveys only basic understing of the writting, similar to a broken conversation, while critical failure offers no understanding of the text.\nYou automatically can comprehend your own writtings.", "modifiers": "", "notes": ""}, "Literacy (Cyrillic)": {"default": -5, "grants": [], "description": "This is the ability to read and write in a language you know, see Language skill (p.23). When writiing a document you roll this skill and the result is the modifier for anyone else who uses this skill to comprehend your writting. Success means that you understand everything written, while critical success offers a deep insight by the handwriting, mannerism, choice of words, etc. Failure conveys only basic understing of the writting, similar to a broken conversation, while critical failure offers no understanding of the text.\nYou automatically can comprehend your own writtings.", "modifiers": "", "notes": ""}, "Literacy (Greek)": {"default": -5, "grants": [], "description": "This is the ability to read and write in a language you know, see Language skill (p.23). When writiing a document you roll this skill and the result is the modifier for anyone else who uses this skill to comprehend your writting. Success means that you understand everything written, while critical success offers a deep insight by the handwriting, mannerism, choice of words, etc. Failure conveys only basic understing of the writting, similar to a broken conversation, while critical failure offers no understanding of the text.\nYou automatically can comprehend your own writtings.", "modifiers": "", "notes": ""}, "Literacy (Hebrew)": {"default": -5, "grants": [], "description": "This is the ability to read and write in a language you know, see Language skill (p.23). When writiing a document you roll this skill and the result is the modifier for anyone else who uses this skill to comprehend your writting. Success means that you understand everything written, while critical success offers a deep insight by the handwriting, mannerism, choice of words, etc. Failure conveys only basic understing of the writting, similar to a broken conversation, while critical failure offers no understanding of the text.\nYou automatically can comprehend your own writtings.", "modifiers": "", "notes": ""}, "Literacy (Mongolian)": {"default": -5, "grants": [], "description": "This is the ability to read and write in a language you know, see Language skill (p.23). When writiing a document you roll this skill and the result is the modifier for anyone else who uses this skill to comprehend your writting. Success means that you understand everything written, while critical success offers a deep insight by the handwriting, mannerism, choice of words, etc. Failure conveys only basic understing of the writting, similar to a broken conversation, while critical failure offers no understanding of the text.\nYou automatically can comprehend your own writtings.", "modifiers": "", "notes": ""}, "Literacy (Turkic)": {"default": -5, "grants": [], "description": "This is the ability to read and write in a language you know, see Language skill (p.23). When writiing a document you roll this skill and the result is the modifier for anyone else who uses this skill to comprehend your writting. Success means that you understand everything written, while critical success offers a deep insight by the handwriting, mannerism, choice of words, etc. Failure conveys only basic understing of the writting, similar to a broken conversation, while critical failure offers no understanding of the text.\nYou automatically can comprehend your own writtings.", "modifiers": "", "notes": ""}, "Literature": {"default": -5, "grants": [], "description": "This is the study of the great writings. A student of literature would be knowledgeable in the realms of old poetry, dusty tomes, criticism, etc. This can be useful for finding clues to hidden treasure, sunken lands, Ancient Secrets, and the like. The work in question must be available in a language you read.", "modifiers": "-5 if you’re illiterate (see Literacy, p.24) and relying on oral tra- dition, save in pre-literate cultures, where this is the norm.", "notes": ""}, "Lockpicking": {"default": -4, "grants": ["Traps"], "description": "This is the ability to open locks without the key or combination. Each attempt requires one minute. If you make the roll and open the lock, each point by which you succeeded shaves five seconds off the required time. (Safecracking and similar challenges can take more time, at the GM’s discretion.)\nNote that if the lock has a trap or alarm attached, you must make a sep- arate Traps roll to circumvent it.", "modifiers": "Equipment modifiers (p.345); -5 if working by touch (e.g., in total darkness). Inside information gives a bonus at GM’s discretion. If the GM requires a DX-based roll (for instance, to work with a particularly delicate mechanism), modifiers for High Manual Dexterity (p.59) or Ham-Fisted (p.138) will apply.", "notes": ""}, "Makeup": {"default": -3, "grants": ["Disguise"], "description": "This is the skill of using theatrical makeup to enhance a performer’s appearance. It is not just the ability to make someone look “pretty” – you can make yourself or others look older, younger, or of a different race or nationality. However, you cannot make someone look taller or shorter than he actually is.", "modifiers": "", "notes": ""}, "Masonry": {"default": -3, "grants": ["Artist (Sculpting)"], "description": "This is the ability to build things out of brick or stone.", "modifiers": "Equipment modifiers (p.345); -3 for simple engineering (erecting scaffolding, moving large blocks of stone, etc.) rather than masonry per se.", "notes": ""}, "Mechanic": {"default": -5, "grants": [], "description": "This is the skill of making and modifying mechanical parts and tools, including diagnosing and fixing problems. A successful skill roll lets you find and repair one problem, or build parts from raw materials, manufacture tools for use with another skill (such as Armoury or Lockpicking), or modify any simple mechanical device not explicitly covered by another skill. The GM may require an inventor to make one or more Machinist rolls before attempting an Engineer roll to assemble a gadget. This skill does not let you invent machines, this requires an engineer or an Engineering specialty.", "modifiers": "-2 for an unfamiliar item within your specialty (e.g., a barge when you’re used to battleships), or for an unfamiliar implementation (e.g., a powerboat engine when you’re used to automobile engines); equipment modifiers (p.345).", "notes": "Includes Machinist. No specialty necessary."}, "Merchant": {"default": -5, "grants": ["Administration", "Economics", "Propaganda"], "description": "This is the skill of buying, selling, and trading retail and wholesale goods. It involves bargaining, salesmanship, and an understanding of trade practices. It covers all types of merchandise, but many merchants have an optional specialty (p.169) in a single class of goods.\nWith this skill you can also predict the short-term behaviour of bond, stock, and currency markets – usually in order to make money! Make a skill roll to determine current market trends. On a critical success, you also learn whether a trend will continue or reverse in the future. On a failure, you get no clear answer. On a critical failure, you guess wrong.\nMake a skill roll to judge the value of any piece of common goods, find out where any commodity is bought and sold, find the local fair market value of any commodity, etc.\nWhen two merchants haggle, the GM may settle it with a Quick Contest. The winner adds or subtracts 10% of fair value, depending on whether he was trying to sell or buy.\nIf you have this skill at any level, you get +1 on reaction rolls when buy- ing or selling. If you have this skill at level 20 or better, you get +2.", "modifiers": "The Talents (p.89) of Business Acumen and Mathematical Ability both provide a bonus. -3 for Gullibility (p. 137); -3 for Low Empathy (p. 142); -1 to -4 for Shyness (p. 154). -3 for illegal goods, unless you have Streetwise at 12+ or specialize in such goods; -2 in an unfa- miliar area, until you have had time to familiarize yourself with local market conditions; Cultural Familiarity modi- fiers (p. 23). These last two modifiers “stack,” and frequently occur together.", "notes": "Includes Market Analysis (p.207)"}, "Meteorology": {"default": -5, "grants": [], "description": "This is the study of the weather, and the ability to predict it. When you wish to predict the weather, the GM rolls against your skill in secret. On a success, he tells the truth; on a failure, he answers randomly, or lies. Each skill roll predicts the weather for one day. If one day’s roll fails, subsequent ones can’t succeed. For instance, a three-day forecast would require three skill rolls:  the first for tomorrow, the second for the next day, and the third for the day after that.", "modifiers": "Time is a major factor! There is no penalty to predict tomor- row’s weather, but you have -1 for 2 days, -2 for 3 days, -4 for 4 days, -6 for 5 days, and an additional -2 per day for each further day.", "notes": "No specialty required."}, "Mimicry (Animal Sounds)": {"default": -5, "grants": ["Mimicry (Bird Calls)"], "description": "Lets you emulate a lion’s roar, a wolf’s howl, a frog’s croak, etc. You can only imitate animals that have distinctive sounds. Make a skill roll to attract animals of the type mim- icked – or predators that normally hunt those animals – if any are nearby. To fool people, you must win a Quick Contest of Mimicry vs. the listeners’ Naturalist-3 or Perception-6.", "modifiers": "", "notes": ""}, "Mimicry (Bird Calls)": {"default": -5, "grants": ["Mimicry (Animal Sounds)"], "description": "Allows you to reproduce the whistles, chirps, and other sounds made by birds. Otherwise, this works as Mimicry (Animal Sounds).", "modifiers": "", "notes": ""}, "Mimicry (Human Speech)": {"default": -5, "grants": [], "description": "Enables you to imitate vocal sounds. This does not allow you to converse in a foreign language, but if you have heard it, you can reproduce the sound of it. If you are trying to mimic a specific person, roll at -3. Treat this roll as a Quick Contest vs. the IQ of anyone who knows the per- son mimicked well.", "modifiers": "", "notes": ""}, "Musical Composition": {"default": -5, "grants": [], "description": "This is the ability to compose a piece of music. A successful skill roll means the piece is a pleasant listening experience.\nTo compose for an ensemble or band without a conductor, you must have a skill level of IQ with at least one instrument in the composition and a skill level of IQ-2 with the rest. Roll at -1 per “instrument group” after the first used in the piece; e.g., a jazz composition for a saxophone section, drums, and bass would require a roll at -2.\nTo compose for an orchestra or band with a conductor requires Group Performance (Conducting) skill (p. 198) at IQ level. Roll at -1 per general class of instruments after the first used in the piece. Classes include brass, percussion, strings, and wood- winds. Treat choir, harp, organ, or piano as its own class.\nThis skill includes the ability to read, write, and transcribe music in your culture’s notation system (if any). Treat different systems – and different musical traditions – as familiarities (see Familiarity, p. 169).", "modifiers": "", "notes": ""}, "Musical Instrument (Percussion/Bumbulum)": {"default": -6, "grants": ["Musical Composition", "Musical Instrument (Percussion/Cymbal)", "Musical Instrument (Percussion/Frame Drum)", "Musical Instrument (Percussion/Glockenspiel)", "Musical Instrument (Percussion/Tabor)", "Musical Instrument (Percussion/Timbrel)"], "description": "This is the ability to play a musical instrument. With a successful skill roll, you give a competent performance. It also includes the ability to read music in your culture’s notation system (if any). Treat different systems as familiarities (see Familiarity, p.169). You must specialise in a particular instrument. Defaults between specialties of the same group are at -3.", "modifiers": "", "notes": ""}, "Musical Instrument (Percussion/Cymbal)": {"default": -6, "grants": ["Musical Composition", "Musical Instrument (Percussion/Bumbulum)", "Musical Instrument (Percussion/Frame Drum)", "Musical Instrument (Percussion/Glockenspiel)", "Musical Instrument (Percussion/Tabor)", "Musical Instrument (Percussion/Timbrel)"], "description": "This is the ability to play a musical instrument. With a successful skill roll, you give a competent performance. It also includes the ability to read music in your culture’s notation system (if any). Treat different systems as familiarities (see Familiarity, p.169). You must specialise in a particular instrument. Defaults between specialties of the same group are at -3.", "modifiers": "", "notes": ""}, "Musical Instrument (Percussion/Frame Drum)": {"default": -6, "grants": ["Musical Composition", "Musical Instrument (Percussion/Bumbulum)", "Musical Instrument (Percussion/Cymbal)", "Musical Instrument (Percussion/Glockenspiel)", "Musical Instrument (Percussion/Tabor)", "Musical Instrument (Percussion/Timbrel)"], "description": "This is the ability
