
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Sheet</title>
<style>
  :root {
    --bg: #1a1410;
    --surface: #231d17;
    --surface2: #2d2520;
    --border: #4a3c2e;
    --border-light: #5c4a38;
    --gold: #c8a454;
    --gold-dim: #9a7a3e;
    --text: #e8dcc8;
    --text-dim: #a09070;
    --text-muted: #6a5a44;
    --red: #c05040;
    --green: #5a9060;
    --blue: #4a7a9a;
    --grey: #808080;
    --accent: #8a6030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ─── HEADER ─── */
  #header {
    background: linear-gradient(180deg, #0e0b08 0%, var(--surface) 100%);
    border-bottom: 2px solid var(--gold-dim);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }

  #char-name {
    font-size: 1.7rem;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    flex: 1;
  }

  #char-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  #char-select:hover, #char-select:focus {
    border-color: var(--gold-dim);
  }

  /* ─── MAIN CONTENT ─── */
  #content {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ─── SECTION ─── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    cursor: pointer;
    background: linear-gradient(90deg, var(--surface2) 0%, var(--surface) 100%);
    border-bottom: 1px solid var(--border);
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover {
    background: linear-gradient(90deg, #332b21 0%, var(--surface2) 100%);
  }

  .section-title {
    font-size: 1.05rem;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .chevron {
    color: var(--gold-dim);
    font-size: 1rem;
    transition: transform 0.25s;
    display: inline-block;
  }
  .section.collapsed .chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  .section-body {
    padding: 16px 18px;
  }

  /* ─── ATTRIBUTES ─── */
  .attrs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
  }

  .attr-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .attr-val {
    font-size: 1.1rem;
    font-weight: bold;
    min-width: 32px;
    text-align: center;
    color: var(--gold);
  }
  .attr-val.neg { color: var(--red); }
  .attr-val.zero { color: var(--text-dim); }

  .attr-name {
    font-size: 0.95rem;
    color: var(--text);
  }

  /* ─── SKILLS ─── */
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
  }

  @media (max-width: 560px) {
    .skills-grid { grid-template-columns: 1fr; }
    .attrs-grid { grid-template-columns: 1fr; }
  }

  .skill-row {
    display: flex;
    flex-direction: column;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .skill-main {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    min-height: 34px;
  }

  .skill-val {
    font-size: 1rem;
    font-weight: bold;
    min-width: 28px;
    text-align: center;
    color: var(--gold);
  }
  .skill-val.neg { color: var(--red); }
  .skill-val.zero { color: var(--text-dim); }
  .skill-val.derived { color: var(--grey); font-weight: normal; font-style: italic; }

  .skill-name {
    font-size: 0.88rem;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }
  .skill-name.derived { color: var(--grey); }
  .skill-name.missing { color: var(--text-muted); }

  .skill-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1rem;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .skill-toggle:hover {
    color: var(--gold);
    background: rgba(200,164,84,0.12);
  }
  .skill-toggle.open { color: var(--gold); }

  .skill-detail {
    display: none;
    padding: 8px 12px 10px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .skill-detail.open { display: block; }

  .skill-detail-section { margin-bottom: 6px; }
  .skill-detail-label {
    color: var(--gold-dim);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  /* ─── ABILITIES ─── */
  .abilities-cat {
    margin-bottom: 18px;
  }
  .abilities-cat:last-child { margin-bottom: 0; }

  .abilities-cat-header {
    font-size: 0.82rem;
    font-weight: bold;
    color: var(--gold-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ability-level {
    color: var(--gold);
    font-size: 0.9rem;
  }

  .ability-item {
    margin-bottom: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.88rem;
    line-height: 1.55;
  }
  .ability-item:last-child { margin-bottom: 0; }

  .ability-name {
    font-weight: bold;
    color: var(--text);
  }

  .ability-desc {
    color: var(--text-dim);
  }

  /* ─── TRAITS ─── */
  .trait-item {
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 4px;
    font-size: 0.88rem;
    line-height: 1.55;
  }
  .trait-item:last-child { margin-bottom: 0; }
  .trait-name {
    font-weight: bold;
    color: var(--text);
  }
  .trait-desc {
    color: var(--text-dim);
    white-space: pre-line;
  }

  /* ─── GEAR ─── */
  .gear-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .gear-item {
    padding: 7px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.9rem;
    color: var(--text-dim);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .gear-item::before {
    content: '◆';
    color: var(--gold-dim);
    font-size: 0.6rem;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .empty-msg {
    color: var(--text-muted);
    font-style: italic;
    font-size: 0.9rem;
  }

  /* ─── SKILL SLIDER ─── */
  #skills-slider-bar {
    padding: 8px 18px 10px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: none;
  }
  #skills-slider {
    width: 100%;
    accent-color: var(--gold);
    cursor: pointer;
    display: block;
  }
  #skills-slider-ticks {
    display: flex;
    justify-content: space-between;
    padding: 2px 1px 0;
  }
  .slider-tick {
    font-size: 0.6rem;
    color: var(--text-muted);
    text-align: center;
    flex: 0 0 auto;
    font-family: monospace;
  }


  a {
    color: var(--gold);
    font-weight: bold;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  a:hover {
    color: var(--gold-dim);
  }

  #import-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 4px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
    padding: 0;
  }
  #import-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  #export-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 4px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
    padding: 0;
  }
  #export-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  /* ─── EXPORT MODAL ─── */
  #export-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #export-overlay.open { display: flex; }

  #export-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 340px;
    max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    overflow: hidden;
  }

  #export-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  #export-modal-title {
    font-size: 0.95rem;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  #export-modal-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #export-download-btn {
    background: var(--accent);
    border: 1px solid var(--gold-dim);
    color: var(--text);
    font-family: inherit;
    font-size: 0.82rem;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #export-download-btn:hover:not(:disabled) { background: var(--gold-dim); }
  #export-download-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: var(--border);
    background: var(--surface2);
  }

  #export-close-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  #export-close-btn:hover { color: var(--text); }

  #export-modal-body {
    padding: 12px 16px;
    max-height: 60vh;
    overflow-y: auto;
  }

  .export-char-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .export-char-row:last-child { border-bottom: none; }
  .export-char-row:hover { color: var(--text); }
  .export-char-row.select-all {
    color: var(--gold-dim);
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 2px;
  }

  .export-char-row input[type="checkbox"] {
    accent-color: var(--gold);
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    cursor: pointer;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.0/math.min.js"></script>
</head>
<body>

<div id="header">
  <div id="char-name">—</div>
  <button id="import-btn" title="Import character JSON files" onclick="document.getElementById('file-input').click()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="12" y1="18" x2="12" y2="12"/>
      <polyline points="9 15 12 12 15 15"/>
    </svg>
  </button>
  <input type="file" id="file-input" accept=".json" multiple style="display:none;">
  <button id="export-btn" title="Export characters" onclick="openExportModal()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
      <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
    </svg>
  </button>
  <select id="char-select"></select>
</div>

<!-- EXPORT MODAL -->
<div id="export-overlay" onclick="if(event.target===this)closeExportModal()">
  <div id="export-modal">
    <div id="export-modal-header">
      <span id="export-modal-title">Export Characters</span>
      <div id="export-modal-actions">
        <button id="export-download-btn" disabled onclick="downloadExport()">Download</button>
        <button id="export-close-btn" onclick="closeExportModal()">✕</button>
      </div>
    </div>
    <div id="export-modal-body">
      <!-- populated by openExportModal() -->
    </div>
  </div>
</div>

<div id="loading-msg" style="color:var(--text-dim);font-style:italic;padding:40px 28px;font-size:0.95rem;">Loading character data…</div>
<div id="content">

  <!-- ATTRIBUTES -->
  <div class="section" id="sec-attributes">
    <div class="section-header" onclick="toggleSection('sec-attributes')">
      <span class="section-title">Attributes</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body">
      <div class="attrs-grid" id="attrs-grid"></div>
    </div>
  </div>

  <!-- SKILLS -->
  <div class="section" id="sec-skills">
    <div class="section-header" onclick="toggleSection('sec-skills')">
      <span class="section-title">Skills <span id="skills-score" style="font-size:0.8em; color:var(--text-dim); font-weight:normal; letter-spacing:0;"></span></span>
      <span class="chevron">▾</span>
    </div>
    <div id="skills-slider-bar">
      <input type="range" id="skills-slider">
      <div id="skills-slider-ticks"></div>
    </div>
    <div class="section-body">
      <div class="skills-grid" id="skills-grid"></div>
    </div>
  </div>

  <!-- ABILITIES -->
  <div class="section" id="sec-abilities">
    <div class="section-header" onclick="toggleSection('sec-abilities')">
      <span class="section-title">Abilities</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body" id="abilities-body"></div>
  </div>

  <!-- TRAITS -->
  <div class="section" id="sec-traits">
    <div class="section-header" onclick="toggleSection('sec-traits')">
      <span class="section-title">Traits</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body" id="traits-body"></div>
  </div>

  <!-- GEAR -->
  <div class="section" id="sec-gear">
    <div class="section-header" onclick="toggleSection('sec-gear')">
      <span class="section-title">Gear</span>
      <span class="chevron">▾</span>
    </div>
    <div class="section-body">
      <ul class="gear-list" id="gear-list"></ul>
    </div>
  </div>

</div>

<script>
// ─── REMOTE DATA SOURCES ──────────────────────────────────────────────────────
const BASE_RAW = 'https://raw.githubusercontent.com/agalamatis/agalamatis.github.io/refs/heads/main/rpg/json';
const CHAR_FILES = ['casimir', 'elisabetta', 'ion', 'leonardo', 'miklos', 'pavo'];

let SKILLS_DB = {};
const CHARS = {};
const FILENAME_MAP = {};


// ─── HELPERS ─────────────────────────────────────────────────────────────────

function fmtVal(v, derived) {
  const cls = derived ? 'derived' : (v > 0 ? '' : v < 0 ? 'neg' : 'zero');
  const str = v > 0 ? '+' + v : v === 0 ? '±0' : String(v);
  return `<span class="skill-val ${cls}">${str}</span>`;
}

function attrFmt(v) {
  const cls = v > 0 ? '' : v < 0 ? 'neg' : 'zero';
  const str = v > 0 ? '+' + v : v === 0 ? '±0' : String(v);
  return `<span class="attr-val ${cls}">${str}</span>`;
}

function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

let skillDetailOpen = {};

function toggleSkillDetail(uid) {
  const detail = document.getElementById('sd-' + uid);
  const btn = document.getElementById('stb-' + uid);
  if (!detail) return;
  const isOpen = detail.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.textContent = isOpen ? '−' : '+';
}

// ─── BUILD SKILLS ─────────────────────────────────────────────────────────────

function buildSkills(charSkills) {
  // charSkills: { skillName: value, ... }
  // For each skill, look up SKILLS_DB for grants and add derived skills
  const allSkills = {};

  // Add primary skills
  for (const [name, val] of Object.entries(charSkills)) {
    allSkills[name] = { value: val, derived: false };
  }

  // Add derived skills from grants
  for (const [name, val] of Object.entries(charSkills)) {
    const entry = SKILLS_DB[name];
    if (!entry) continue;
    for (const grantedSkill of (entry.grants || [])) {
      if (allSkills[grantedSkill]) continue; // already have it
      const derivedEntry = SKILLS_DB[grantedSkill];
      const defaultOffset = derivedEntry ? derivedEntry.default : -4;
      const derivedVal = val + defaultOffset;
      allSkills[grantedSkill] = { value: derivedVal, derived: true };
    }
  }

  // Parse language skill components from "Language (group/family/specialty)"
  function parseLang(n) {
    const m = n.match(/^Language \(([^/]+)\/([^/]+)\/([^)]+)\)$/);
    return m ? { group: m[1], family: m[2], specialty: m[3] } : null;
  }

  // Collect group+family sets from the character's own (primary) language skills
  const charLangGroups = new Set();
  const charLangFamilies = new Set();
  const charLangsByFamily = {}; // family -> max value among char's primary skills
  for (const [n, v] of Object.entries(charSkills)) {
    const p = parseLang(n);
    if (!p) continue;
    charLangGroups.add(p.group);
    charLangFamilies.add(p.family);
    if (charLangsByFamily[p.family] === undefined || v > charLangsByFamily[p.family])
      charLangsByFamily[p.family] = v;
  }

  // Add all remaining DB skills not yet present
  for (const [name, entry] of Object.entries(SKILLS_DB)) {
    if (allSkills[name]) continue;

    if (name.startsWith('Language (')) {
      const p = parseLang(name);

      // Non-bracketed language (e.g. "Language (Albanian)") — treat as normal missing skill
      if (!p) {
        allSkills[name] = { value: entry.default, derived: false, missing: true };
        continue;
      }

      const inGrants = Object.keys(charSkills).some(n => {
        const db = SKILLS_DB[n];
        return db && db.grants && db.grants.includes(name);
      });

      const sharesGroup  = charLangGroups.has(p.group);
      const sharesFamily = charLangFamilies.has(p.family);

      // Hide if not in grants AND doesn't share group AND doesn't share family
      if (!inGrants && !sharesGroup && !sharesFamily) continue;

      // Compute best value: use family-based default (-3 for same family) if applicable
      let bestVal = entry.default; // fallback to raw default
      if (sharesFamily) {
        const baseVal = charLangsByFamily[p.family];
        bestVal = Math.max(bestVal, baseVal - 3);
      }
      // grants-derived values were already added in the grants loop above;
      // this only runs for skills not yet in allSkills, so grants handled there.

      allSkills[name] = { value: bestVal, derived: true, missing: false };
    } else {
      allSkills[name] = { value: entry.default, derived: false, missing: true };
    }
  }

  // Sort alphabetically
  const sorted = Object.keys(allSkills).sort((a, b) => a.localeCompare(b));

  const grid = document.getElementById('skills-grid');
  grid.innerHTML = '';

  sorted.forEach((name, i) => {
    const { value, derived, missing } = allSkills[name];
    const uid = 'skill_' + i;
    const dbEntry = SKILLS_DB[name];

    const hasDetail = dbEntry && (dbEntry.description || dbEntry.modifiers || dbEntry.notes);

    const row = document.createElement('div');
    row.className = 'skill-row';
    row.dataset.skillValue = value;

    const nameCls = missing ? 'skill-name missing' : derived ? 'skill-name derived' : 'skill-name';
    const valHtml = fmtVal(value, derived || missing);

    let detailHtml = '';
    if (hasDetail) {
      const parts = [];
      if (dbEntry.description) {
        parts.push(`<div class="skill-detail-section"><div class="skill-detail-label">Description</div>${escHtml(dbEntry.description)}</div>`);
      }
      if (dbEntry.modifiers) {
        parts.push(`<div class="skill-detail-section"><div class="skill-detail-label">Modifiers</div>${escHtml(dbEntry.modifiers)}</div>`);
      }
      if (dbEntry.notes) {
        parts.push(`<div class="skill-detail-section"><div class="skill-detail-label">Notes</div>${escHtml(dbEntry.notes)}</div>`);
      }
      detailHtml = `<div class="skill-detail" id="sd-${uid}">${parts.join('')}</div>`;
    }

    const toggleBtn = hasDetail
      ? `<button class="skill-toggle" id="stb-${uid}" onclick="toggleSkillDetail('${uid}')" title="Show details">+</button>`
      : `<span style="width:22px;flex-shrink:0;"></span>`;

    row.innerHTML = `
      <div class="skill-main">
        ${valHtml}
        <span class="${nameCls}">${escHtml(name)}</span>
        ${toggleBtn}
      </div>
      ${detailHtml}
    `;

    grid.appendChild(row);
  });

  // Compute sum of normal CDF(value, mu=0, sigma=2.958) for all skills
  const mu = 0;
  const sigma = 2.958;
  let scoreSum = 0;
  for (const { value } of Object.values(allSkills)) {
    scoreSum += math.erf((value - mu) / (sigma * Math.sqrt(2))) / 2 + 0.5;
  }
  document.getElementById('skills-score').textContent = '(' + scoreSum.toFixed(2) + ')';

  // ─── SLIDER ──────────────────────────────────────────────────────────────
  const allValues = Object.values(allSkills).map(s => s.value);
  const minVal = Math.min(...allValues);
  const maxVal = Math.max(...allValues);

  const sliderBar = document.getElementById('skills-slider-bar');
  const slider    = document.getElementById('skills-slider');
  const ticksEl   = document.getElementById('skills-slider-ticks');

  slider.min   = minVal;
  slider.max   = maxVal;
  slider.step  = 1;
  slider.value = minVal;

  ticksEl.innerHTML = '';
  for (let v = minVal; v <= maxVal; v++) {
    const t = document.createElement('span');
    t.className = 'slider-tick';
    const cdf = math.erf(v / (2.958 * Math.sqrt(2))) / 2 + 0.5;
    t.textContent = v + ' (' + (cdf * 100).toFixed(2) + '%)';
    ticksEl.appendChild(t);
  }

  sliderBar.style.display = 'block';

  // Replace node to drop any previous listener
  const fresh = slider.cloneNode(true);
  slider.parentNode.replaceChild(fresh, slider);
  document.getElementById('skills-slider').addEventListener('input', function() {
    const threshold = parseInt(this.value, 10);
    grid.querySelectorAll('.skill-row').forEach(row => {
      row.style.display = parseInt(row.dataset.skillValue, 10) < threshold ? 'none' : '';
    });
  });

}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── BUILD ABILITIES ──────────────────────────────────────────────────────────

function buildAbilities(abilities) {
  const body = document.getElementById('abilities-body');
  body.innerHTML = '';
  const cats = ['Awareness', 'Faith', 'Heritage', 'Nobility'];
  let anyShown = false;

  for (const cat of cats) {
    const catData = abilities[cat];
    if (!catData || catData.level === 0 || Object.keys(catData.abilities).length === 0) continue;
    anyShown = true;

    const div = document.createElement('div');
    div.className = 'abilities-cat';

    const level = catData.level;
    div.innerHTML = `<div class="abilities-cat-header"><span class="ability-level">+${level}</span><span>${cat}</span></div>`;

    for (const [abName, abDesc] of Object.entries(catData.abilities)) {
      const item = document.createElement('div');
      item.className = 'ability-item';
      item.innerHTML = `<span class="ability-name">${escHtml(abName)}:</span> <span class="ability-desc">${escHtml(abDesc)}</span>`;
      div.appendChild(item);
    }

    body.appendChild(div);
  }

  if (!anyShown) {
    body.innerHTML = '<span class="empty-msg">No abilities.</span>';
  }
}

// ─── BUILD TRAITS ─────────────────────────────────────────────────────────────

function buildTraits(traits) {
  const body = document.getElementById('traits-body');
  body.innerHTML = '';

  if (!traits || Object.keys(traits).length === 0) {
    body.innerHTML = '<span class="empty-msg">No traits.</span>';
    return;
  }

  for (const [tName, tDesc] of Object.entries(traits)) {
    const item = document.createElement('div');
    item.className = 'trait-item';
    item.innerHTML = `<span class="trait-name">${escHtml(tName)}:</span><br><span class="trait-desc">${escHtml(tDesc)}</span>`;
    body.appendChild(item);
  }
}

// ─── RENDER CHARACTER ─────────────────────────────────────────────────────────

function renderChar(data) {
  // Name
  document.getElementById('char-name').textContent = data.name;
  document.title = data.name + ' — Character Sheet';

  // Attributes — fixed display order, 2 cols × 3 rows
  const attrOrder = ['Agility', 'Charisma', 'Health', 'Perception', 'Strength', 'Reason'];
  const grid = document.getElementById('attrs-grid');
  grid.innerHTML = '';
  for (const key of attrOrder) {
    const v = data.attributes[key] !== undefined ? data.attributes[key] : 0;
    const item = document.createElement('div');
    item.className = 'attr-item';
    item.innerHTML = `${attrFmt(v)} <span class="attr-name">${escHtml(key)}</span>`;
    grid.appendChild(item);
  }

  // Skills
  buildSkills(data.skills);

  // Abilities
  buildAbilities(data.abilities);

  // Traits
  buildTraits(data.traits);

  // Gear
  const gearList = document.getElementById('gear-list');
  gearList.innerHTML = '';
  if (!data.gear || data.gear.length === 0) {
    gearList.innerHTML = '<span class="empty-msg">No gear.</span>';
  } else {
    for (const item of data.gear) {
      const li = document.createElement('li');
      li.className = 'gear-item';
      li.innerHTML = item;
      gearList.appendChild(li);
    }
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────────────────

function normalizeChar(raw) {
  const abilitiesMap = {};
  for (const [cat, items] of Object.entries(raw.Abilities || {})) {
    if (Array.isArray(items) && items.length) {
      const maxLevel = Math.max(...items.map(x => x.level));
      const abDict = {};
      items.forEach(x => { abDict[x.name] = x.description; });
      abilitiesMap[cat] = { level: maxLevel, abilities: abDict };
    } else {
      abilitiesMap[cat] = { level: 0, abilities: {} };
    }
  }
  const traits = {};
  for (const t of (raw.Traits || [])) traits[t.name] = t.description;
  return {
    name: raw.Name,
    attributes: raw.Attributes,
    skills: raw.Skills,
    abilities: abilitiesMap,
    traits,
    gear: raw.Gear
  };
}

function refreshSelect() {
  const sel = document.getElementById('char-select');
  const current = sel.value;
  sel.innerHTML = '';
  for (const [key, data] of Object.entries(CHARS)) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = data.name;
    sel.appendChild(opt);
  }
  // Restore selection if still valid, else pick first
  if (CHARS[current]) sel.value = current;
  else sel.value = Object.keys(CHARS)[0];
  renderChar(CHARS[sel.value]);
}

// ─── ASYNC BOOTSTRAP ─────────────────────────────────────────────────────────

function buildSkillsDB(list) {
  const db = {};
  for (const s of list) {
    db[s.skill] = {
      default: s.default ?? 0,
      grants: s.grants || [],
      description: s.description || '',
      modifiers: s.modifiers || '',
      notes: s.notes || ''
    };
  }
  return db;
}

async function loadRemote() {
  const loadingEl = document.getElementById('loading-msg');

  // Fetch skills.json and all character files in parallel
  const skillsPromise = fetch(BASE_RAW + '/skills.json').then(r => r.json());
  const charPromises = CHAR_FILES.map(stem =>
    fetch(BASE_RAW + '/characters/' + stem + '.json')
      .then(r => r.json())
      .then(raw => ({ stem, data: normalizeChar(raw) }))
      .catch(err => { console.warn('Failed to load', stem, err); return null; })
  );

  const [skillsList, ...charResults] = await Promise.all([skillsPromise, ...charPromises]);

  // Populate SKILLS_DB
  Object.assign(SKILLS_DB, buildSkillsDB(skillsList));

  // Populate CHARS and FILENAME_MAP
  for (const result of charResults) {
    if (!result) continue;
    CHARS[result.stem] = result.data;
    FILENAME_MAP[result.stem] = result.stem;
  }

  // Build dropdown from loaded characters
  const sel = document.getElementById('char-select');
  sel.innerHTML = '';
  for (const [key, data] of Object.entries(CHARS)) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = data.name;
    sel.appendChild(opt);
  }

  if (loadingEl) loadingEl.remove();

  sel.addEventListener('change', () => renderChar(CHARS[sel.value]));
  const firstKey = Object.keys(CHARS)[0];
  if (firstKey) renderChar(CHARS[firstKey]);
}

// File import listener (now uses the live SKILLS_DB and CHARS)
document.getElementById('file-input').addEventListener('change', function() {
  const files = Array.from(this.files);
  if (!files.length) return;
  let pending = files.length;
  files.forEach(file => {
    const stem = file.name.replace(/\.json$/i, '').toLowerCase();
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const raw = JSON.parse(e.target.result);
        const data = normalizeChar(raw);
        const existingKey = FILENAME_MAP[stem];
        if (existingKey) {
          CHARS[existingKey] = data;
        } else {
          CHARS[stem] = data;
          FILENAME_MAP[stem] = stem;
        }
      } catch(err) {
        console.warn('Failed to parse', file.name, err);
      }
      if (--pending === 0) refreshSelect();
    };
    reader.readAsText(file);
  });
  this.value = '';
});

// ─── EXPORT ──────────────────────────────────────────────────────────────────

function computeAllSkills(charSkills) {
  const allSkills = {};
  for (const [name, val] of Object.entries(charSkills))
    allSkills[name] = { value: val };
  for (const [name, val] of Object.entries(charSkills)) {
    const entry = SKILLS_DB[name];
    if (!entry) continue;
    for (const grantedSkill of (entry.grants || [])) {
      if (allSkills[grantedSkill]) continue;
      const de = SKILLS_DB[grantedSkill];
      allSkills[grantedSkill] = { value: val + (de ? de.default : -4) };
    }
  }
  function parseLang(n) {
    const m = n.match(/^Language \(([^/]+)\/([^/]+)\/([^)]+)\)$/);
    return m ? { group: m[1], family: m[2] } : null;
  }
  const charLangGroups = new Set(), charLangFamilies = new Set(), charLangsByFamily = {};
  for (const [n, v] of Object.entries(charSkills)) {
    const p = parseLang(n); if (!p) continue;
    charLangGroups.add(p.group); charLangFamilies.add(p.family);
    if (charLangsByFamily[p.family] === undefined || v > charLangsByFamily[p.family])
      charLangsByFamily[p.family] = v;
  }
  for (const [name, entry] of Object.entries(SKILLS_DB)) {
    if (allSkills[name]) continue;
    if (name.startsWith('Language (')) {
      const p = parseLang(name);
      if (!p) { allSkills[name] = { value: entry.default }; continue; }
      const inGrants = Object.keys(charSkills).some(n => {
        const db = SKILLS_DB[n]; return db && db.grants && db.grants.includes(name);
      });
      if (!inGrants && !charLangGroups.has(p.group) && !charLangFamilies.has(p.family)) continue;
      let bestVal = entry.default;
      if (charLangFamilies.has(p.family))
        bestVal = Math.max(bestVal, charLangsByFamily[p.family] - 3);
      allSkills[name] = { value: bestVal };
    } else {
      allSkills[name] = { value: entry.default };
    }
  }
  return allSkills;
}

function openExportModal() {
  const body = document.getElementById('export-modal-body');
  body.innerHTML = '';
  const keys = Object.keys(CHARS);

  // Select-all row
  const allRow = document.createElement('label');
  allRow.className = 'export-char-row select-all';
  const allCb = document.createElement('input');
  allCb.type = 'checkbox'; allCb.id = 'export-cb-all';
  allCb.addEventListener('change', () => {
    body.querySelectorAll('.export-char-cb').forEach(cb => { cb.checked = allCb.checked; });
    updateDownloadBtn();
  });
  allRow.appendChild(allCb);
  allRow.appendChild(document.createTextNode('Select all'));
  body.appendChild(allRow);

  // One row per character
  for (const key of keys) {
    const row = document.createElement('label');
    row.className = 'export-char-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'export-char-cb'; cb.dataset.key = key;
    cb.addEventListener('change', () => {
      allCb.checked = [...body.querySelectorAll('.export-char-cb')].every(c => c.checked);
      updateDownloadBtn();
    });
    row.appendChild(cb);
    row.appendChild(document.createTextNode(CHARS[key].name));
    body.appendChild(row);
  }

  updateDownloadBtn();
  document.getElementById('export-overlay').classList.add('open');
}

function closeExportModal() {
  document.getElementById('export-overlay').classList.remove('open');
}

function updateDownloadBtn() {
  const any = document.querySelector('.export-char-cb:checked');
  document.getElementById('export-download-btn').disabled = !any;
}

function downloadExport() {
  const selected = [...document.querySelectorAll('.export-char-cb:checked')]
    .map(cb => cb.dataset.key);

  const output = {};
  for (const key of selected) {
    const char = CHARS[key];
    const computedSkills = computeAllSkills(char.skills);
    output[key] = {
      name: char.name,
      attributes: char.attributes,
      skills: Object.fromEntries(
        Object.entries(computedSkills).sort(([a],[b]) => a.localeCompare(b))
          .map(([n, {value}]) => [n, value])
      ),
      abilities: char.abilities,
      traits: char.traits,
      gear: char.gear
    };
  }

  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = selected.length === 1
    ? (selected[0] + '_export.json')
    : 'characters_export.json';
  a.click();
  URL.revokeObjectURL(url);
  closeExportModal();
}

loadRemote();
</script>
